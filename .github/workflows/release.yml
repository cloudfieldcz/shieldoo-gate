name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Least-privilege floor: every job starts read-only and widens its own
# scopes explicitly (Scorecard Token-Permissions). The signing/attestation
# jobs additionally request `id-token: write` for keyless Sigstore/OIDC.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Keep in lockstep with go.mod's `go` directive and docker/Dockerfile's
  # golang builder tag — 1.26.4 carries the stdlib fix for CVE-2026-42504
  # (mime DoS), CVE-2026-42507 (net/textproto) and CVE-2026-27145 (x509).
  GO_VERSION: "1.26.4"

jobs:
  docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push image + provenance/SBOM referrers to ghcr
      id-token: write        # keyless cosign + provenance attestation (OIDC)
      attestations: write    # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: shieldoo-gate
            dockerfile: docker/Dockerfile
            context: .
          - image: scanner-bridge
            dockerfile: scanner-bridge/Dockerfile
            context: scanner-bridge
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            SGW_TOKEN=${{ secrets.SGW_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64
          # BuildKit attaches in-toto SLSA provenance (max: full build graph)
          # and a CycloneDX SBOM as OCI referrers on the pushed image.
          provenance: mode=max
          sbom: true

      # GitHub-hosted SLSA build provenance for the image, keyed on the
      # immutable digest from the push above. push-to-registry: true also
      # writes the attestation as an OCI referrer so `gh attestation verify`
      # and registry clients can both resolve it.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signature (Fulcio cert via GitHub OIDC, recorded in Rekor).
      # Sign by digest, never by tag — the tag can be re-pointed, the digest
      # cannot. Verify with:
      #   cosign verify ghcr.io/<owner>/<image>@<digest> \
      #     --certificate-identity-regexp 'https://github.com/<owner>/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign "${IMAGE}@${DIGEST}"

  shdg:
    name: shdg ${{ matrix.target.os }}/${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: amd64, archive: tar.gz, ext: "" }
          - { os: linux,   arch: arm64, archive: tar.gz, ext: "" }
          - { os: darwin,  arch: amd64, archive: tar.gz, ext: "" }
          - { os: darwin,  arch: arm64, archive: tar.gz, ext: "" }
          - { os: windows, arch: amd64, archive: zip,    ext: ".exe" }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: Resolve version + commit
        id: meta
        run: |
          set -eu
          # Strip the `v` prefix so shdg's runtime version matches the Docker
          # tag (`shieldoo-gate:1.2.3` and `shdg version` → `1.2.3`).
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short HEAD)"
          stem="shdg-${version}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"
          echo "commit=${commit}"     >> "$GITHUB_OUTPUT"
          echo "stem=${stem}"         >> "$GITHUB_OUTPUT"

      # CGO is off — shdg is stdlib-only, so a static cross-compile from a
      # Linux runner produces deterministic binaries for every target.
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          set -eu
          mkdir -p dist
          out="dist/shdg${{ matrix.target.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.meta.outputs.version }} -X main.Commit=${{ steps.meta.outputs.commit }}" \
            -o "${out}" \
            ./cmd/shdg
          ls -la dist/

      - name: Package
        id: package
        run: |
          set -eu
          stem="${{ steps.meta.outputs.stem }}"
          cd dist
          if [ "${{ matrix.target.archive }}" = "zip" ]; then
            archive="${stem}.zip"
            zip -q "${archive}" "shdg${{ matrix.target.ext }}"
          else
            archive="${stem}.tar.gz"
            tar -czf "${archive}" "shdg${{ matrix.target.ext }}"
          fi
          sha256sum "${archive}" | tee "${archive}.sha256"
          echo "archive=${archive}"        >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shdg-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            dist/${{ steps.package.outputs.archive }}
            dist/${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  vuln-scan:
    # Dogfood: every release uploads a CycloneDX SBOM of each Shieldoo Gate
    # component to the production gate itself, gating the release on new
    # high-or-worse findings. Uses the freshly-built shdg from the `shdg` job
    # (linux-amd64 artifact) — no chicken-and-egg with previous releases.
    name: Vuln-scan ${{ matrix.component.name }}
    needs: [docker, shdg]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: ui,             dir: ui,             ecosystem: npm  }
          - { name: gate,           dir: ".",            ecosystem: go   }
          - { name: scanner-bridge, dir: scanner-bridge, ecosystem: pypi }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download shdg (linux-amd64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shdg-linux-amd64
          path: shdg-dist

      - name: Install shdg
        run: |
          set -eu
          tar -xzf shdg-dist/shdg-*-linux-amd64.tar.gz -C shdg-dist
          chmod +x shdg-dist/shdg
          echo "${PWD}/shdg-dist" >> "$GITHUB_PATH"
          shdg-dist/shdg version

      # SGW_TOKEN is the global super-token (`*` scope) — covers `scan:upload`.
      # Each call writes a `super_token_used` audit row by design (CLAUDE.md
      # security invariant #6); release-time entries are expected and traceable.
      # Project label `shieldoo-gate` matches SGW_USER in docker/Dockerfile.
      - name: Scan ${{ matrix.component.name }}
        env:
          SHIELDOO_URL:   ${{ vars.SHIELDOO_URL }}
          SHIELDOO_TOKEN: ${{ secrets.SGW_TOKEN }}
        run: |
          # --skip-dirs excludes example projects (intentionally pinned to old
          # versions for demo/E2E) and tests/ from the gate (dir=.) scan so they
          # do not pollute the shieldoo-gate component's dashboard.
          # --sbom-output persists the exact CycloneDX bytes uploaded to the
          # gate so the release job can sign and publish them (T7).
          shdg scan \
            --project   shieldoo-gate \
            --component ${{ matrix.component.name }} \
            --dir       ${{ matrix.component.dir }} \
            --ecosystem ${{ matrix.component.ecosystem }} \
            --skip-dirs examples,tests \
            --sbom-output sbom-${{ matrix.component.name }}.cdx.json \
            --wait --fail-on high --timeout 10m

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.component.name }}
          path: sbom-${{ matrix.component.name }}.cdx.json
          if-no-files-found: error
          retention-days: 7

  vuln-scan-image:
    # Container-level dogfood: scan the freshly-built ghcr.io images via
    # `shdg --image` (shells out to `trivy image`). Catches base-image OS
    # CVEs (debian/alpine packages, openssl, etc.) that the source-tree
    # vuln-scan above cannot see — those only surface inside the final
    # container layers. Tracked as separate components `<image>-image`
    # so source-level and image-level findings stay distinguishable in
    # the dashboard.
    name: Vuln-scan image ${{ matrix.image.name }}
    needs: [docker, shdg]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # pull the freshly-pushed ghcr image for trivy
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: gate-image,           ref: shieldoo-gate }
          - { name: scanner-bridge-image, ref: scanner-bridge }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        # Trivy reads docker creds from ~/.docker/config.json to pull the
        # ghcr.io image during scan; the docker/login-action writes that file.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download shdg (linux-amd64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shdg-linux-amd64
          path: shdg-dist

      - name: Install shdg
        run: |
          set -eu
          tar -xzf shdg-dist/shdg-*-linux-amd64.tar.gz -C shdg-dist
          chmod +x shdg-dist/shdg
          echo "${PWD}/shdg-dist" >> "$GITHUB_PATH"
          shdg-dist/shdg version

      - name: Scan image ${{ matrix.image.ref }}:${{ needs.docker.outputs.version }}
        env:
          SHIELDOO_URL:   ${{ vars.SHIELDOO_URL }}
          SHIELDOO_TOKEN: ${{ secrets.SGW_TOKEN }}
        run: |
          # Image scans gate on `critical`, not `high`. Container base-image OS
          # packages (Debian/alpine: kernel headers, ncurses, perl, libssh2,
          # mbedtls, …) produce a continuous stream of HIGH CVEs that usually
          # have no upstream fix at release time (fixed_version empty), so gating
          # releases on them blocks shipping through no fault of our code. High
          # base-image CVEs are handled by periodic base-image bumps, not by
          # release-blocking. CRITICALs still fail the build. The source-tree
          # vuln-scan job above keeps `--fail-on high` — those are our own deps
          # and are actionable.
          shdg scan \
            --project   shieldoo-gate \
            --component ${{ matrix.image.name }} \
            --image     ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.ref }}:${{ needs.docker.outputs.version }} \
            --ecosystem docker \
            --sbom-output sbom-${{ matrix.image.name }}.cdx.json \
            --wait --fail-on critical --timeout 15m

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.cdx.json
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub release
    needs: [docker, shdg, vuln-scan, vuln-scan-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release + upload assets
      id-token: write        # keyless cosign sign-blob + provenance (OIDC)
      attestations: write    # actions/attest-build-provenance for binaries
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history for changelog

      - name: Download shdg artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: shdg-*
          merge-multiple: true

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: sbom-*
          merge-multiple: true

      - name: Aggregate checksums
        id: assets
        run: |
          set -eu
          mkdir -p release
          # Move archives + the dogfooded CycloneDX SBOMs into a flat release/
          # dir, and collapse all the per-file *.sha256 stubs into a single
          # SHA256SUMS file (the conventional format users feed into
          # `sha256sum -c`). SBOMs are covered by SHA256SUMS too.
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.cdx.json' \) -exec mv {} release/ \;
          # No 2>/dev/null: a glob that fails to expand must fail the release
          # (fail-closed) rather than silently ship an incomplete SHA256SUMS.
          ( cd release && sha256sum *.tar.gz *.zip *.cdx.json > SHA256SUMS )
          echo "--- release/ ---"
          ls -la release/
          echo "--- SHA256SUMS ---"
          cat release/SHA256SUMS

      - name: Build release notes
        id: notes
        env:
          VERSION: ${{ needs.docker.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          # Two distinct identifiers are needed below:
          #   * tag (with v) — used as a git ref for `git log <prev>..<tag>`,
          #     because annotated tags are stored as `v1.2.3`
          #   * VERSION (no v) — used in user-facing strings (Docker tags,
          #     archive filenames) so all release artifacts agree
          tag="${GITHUB_REF_NAME}"
          previous="$(git tag --sort=-creatordate | grep -vFx "${tag}" | head -n1 || true)"
          if [ -z "${previous}" ]; then
            range="$(git rev-list --max-parents=0 HEAD | head -n1)..HEAD"
            range_label="initial release"
          else
            range="${previous}..${tag}"
            range_label="${previous}…${tag}"
          fi

          {
            echo "## Docker images"
            echo ""
            echo "Pull the matching ghcr.io tag:"
            echo ""
            echo '```bash'
            echo "docker pull ${REGISTRY}/${REPO_OWNER}/shieldoo-gate:${VERSION}"
            echo "docker pull ${REGISTRY}/${REPO_OWNER}/scanner-bridge:${VERSION}"
            echo '```'
            echo ""
            echo "Image pages:"
            echo "- [shieldoo-gate](https://github.com/${REPO_OWNER}/shieldoo-gate/pkgs/container/shieldoo-gate)"
            echo "- [scanner-bridge](https://github.com/${REPO_OWNER}/shieldoo-gate/pkgs/container/scanner-bridge)"
            echo ""
            echo "## shdg CLI"
            echo ""
            echo "Push-from-CI client. Pre-built for Linux, macOS, and Windows:"
            echo ""
            echo "| OS | Arch | Archive |"
            echo "|---|---|---|"
            echo "| Linux   | x86_64  | shdg-${VERSION}-linux-amd64.tar.gz |"
            echo "| Linux   | aarch64 | shdg-${VERSION}-linux-arm64.tar.gz |"
            echo "| macOS   | Intel   | shdg-${VERSION}-darwin-amd64.tar.gz |"
            echo "| macOS   | Apple Silicon | shdg-${VERSION}-darwin-arm64.tar.gz |"
            echo "| Windows | x86_64  | shdg-${VERSION}-windows-amd64.zip |"
            echo ""
            echo "\`shdg version\` reports \`${VERSION}\` to match the Docker tag."
            echo "Verify archive integrity with \`SHA256SUMS\` (also attached)."
            echo ""
            echo "## Supply-chain security"
            echo ""
            echo "All artifacts are signed and carry SLSA build provenance (keyless, via GitHub OIDC + Sigstore)."
            echo ""
            echo "- **Images** — cosign signature + SLSA provenance + CycloneDX SBOM attached as OCI referrers:"
            echo '  ```bash'
            echo "  cosign verify ${REGISTRY}/${REPO_OWNER}/shieldoo-gate:${VERSION} \\"
            echo "    --certificate-identity-regexp 'https://github.com/${REPO_OWNER}/.+' \\"
            echo "    --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo "  gh attestation verify oci://${REGISTRY}/${REPO_OWNER}/shieldoo-gate:${VERSION} --repo ${REPO_OWNER}/shieldoo-gate"
            echo '  ```'
            echo "- **shdg binaries** — SLSA provenance: \`gh attestation verify shdg-${VERSION}-linux-amd64.tar.gz --repo ${REPO_OWNER}/shieldoo-gate\`"
            echo "- **Detached signatures** — each archive and \`SHA256SUMS\` also ships a keyless \`*.sig\` + \`*.pem\` cert (recognised by OpenSSF Scorecard):"
            echo '  ```bash'
            echo "  cosign verify-blob \\"
            echo "    --signature shdg-${VERSION}-linux-amd64.tar.gz.sig \\"
            echo "    --certificate shdg-${VERSION}-linux-amd64.tar.gz.pem \\"
            echo "    --certificate-identity-regexp 'https://github.com/${REPO_OWNER}/.+' \\"
            echo "    --certificate-oidc-issuer https://token.actions.githubusercontent.com shdg-${VERSION}-linux-amd64.tar.gz"
            echo '  ```'
            echo "  The same provenance is also attached as \`shdg-${VERSION}.intoto.jsonl\`."
            echo "- **SBOMs** — the CycloneDX SBOMs dogfooded through the gate are attached (\`*.cdx.json\`) with a detached cosign bundle (\`*.cdx.json.cosign.bundle\`):"
            echo '  ```bash'
            echo "  cosign verify-blob --bundle sbom-gate.cdx.json.cosign.bundle \\"
            echo "    --certificate-identity-regexp 'https://github.com/${REPO_OWNER}/.+' \\"
            echo "    --certificate-oidc-issuer https://token.actions.githubusercontent.com sbom-gate.cdx.json"
            echo '  ```'
            echo ""
            echo "## Changes (${range_label})"
            echo ""
            git log --pretty=format:"- %s (%h)" "${range}"
            echo ""
          } > release/RELEASE_NOTES.md

          echo "--- RELEASE_NOTES.md ---"
          cat release/RELEASE_NOTES.md

      # SLSA build provenance for the shdg binaries (one attestation covering
      # all five archives). Verify with:
      #   gh attestation verify shdg-<ver>-linux-amd64.tar.gz --repo <owner>/shieldoo-gate
      - name: Attest shdg binary provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/shdg-*.tar.gz
            release/shdg-*.zip

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Detached keyless signature per dogfooded CycloneDX SBOM. Each
      # <name>.cdx.json.cosign.bundle carries the signature + Fulcio cert +
      # Rekor entry; verify with:
      #   cosign verify-blob --bundle <name>.cdx.json.cosign.bundle \
      #     --certificate-identity-regexp 'https://github.com/<owner>/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     <name>.cdx.json
      - name: Sign SBOMs (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -eu
          for sbom in release/*.cdx.json; do
            # Fail closed on a hollow SBOM: a signed-but-empty SBOM falsely
            # attests completeness, which is worse than no SBOM at all.
            [ -s "${sbom}" ] || { echo "refusing to sign empty SBOM: ${sbom}" >&2; exit 1; }
            cosign sign-blob --bundle "${sbom}.cosign.bundle" "${sbom}"
          done
          ls -la release/*.cosign.bundle

      # Scorecard-compatible "old style" assets, in addition to the Sigstore
      # bundles / OCI referrers / GitHub attestations above. OpenSSF Scorecard's
      # Signed-Releases check ONLY inspects GitHub release assets and matches on
      # filename suffix — it does not query ghcr referrers or the attestations
      # API, and does not recognise the `.cosign.bundle` extension. So we also
      # publish:
      #   * a detached `<archive>.sig` (+ `.pem` cert) per archive + SHA256SUMS
      #     — suffix `.sig` is on Scorecard's signature whitelist;
      #   * the SLSA provenance bundle as `shdg-<ver>.intoto.jsonl` — suffix
      #     `.intoto.jsonl` is what Scorecard reads as provenance.
      # Both files carry the *same* keyless Sigstore material as the new-style
      # assets, just under the names/extensions the scanner pattern-matches.
      - name: Detached signatures + provenance asset (Scorecard-compatible)
        env:
          COSIGN_YES: "true"
          VERSION: ${{ needs.docker.outputs.version }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -eu
          # Detached keyless signature + cert for every archive and the checksum
          # manifest (the artifacts a consumer actually downloads and runs).
          # cosign v3 defaults to TUF-provided signing-config + the new
          # self-contained bundle format, both of which require --bundle and
          # ignore --output-signature/--output-certificate. Scorecard only
          # recognises the legacy `.sig` suffix, so force the legacy detached
          # path explicitly (--use-signing-config=false --new-bundle-format=false).
          # tlog upload stays on (default) so the signature is still recorded
          # in Rekor for transparency.
          for f in release/*.tar.gz release/*.zip release/SHA256SUMS; do
            [ -s "${f}" ] || { echo "refusing to sign empty/missing artifact: ${f}" >&2; exit 1; }
            cosign sign-blob \
              --use-signing-config=false \
              --new-bundle-format=false \
              --output-signature   "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done
          # Republish the binary SLSA provenance attestation (one Sigstore
          # bundle covering all five archives) under the .intoto.jsonl suffix
          # Scorecard recognises. Fail closed if the attest step produced none.
          [ -s "${BUNDLE_PATH}" ] || { echo "missing provenance bundle from attest step: ${BUNDLE_PATH}" >&2; exit 1; }
          cp "${BUNDLE_PATH}" "release/shdg-${VERSION}.intoto.jsonl"
          ls -la release/*.sig release/*.pem release/*.intoto.jsonl

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/shdg-*.tar.gz
            release/shdg-*.zip
            release/SHA256SUMS
            release/*.cdx.json
            release/*.cosign.bundle
            release/*.sig
            release/*.pem
            release/*.intoto.jsonl
          fail_on_unmatched_files: true
