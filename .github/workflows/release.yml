name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # release creation + asset upload
  packages: write   # ghcr push

env:
  REGISTRY: ghcr.io
  # Keep in lockstep with go.mod's `go` directive and docker/Dockerfile's
  # golang builder tag — 1.26.4 carries the stdlib fix for CVE-2026-42504
  # (mime DoS), CVE-2026-42507 (net/textproto) and CVE-2026-27145 (x509).
  GO_VERSION: "1.26.4"

jobs:
  docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: shieldoo-gate
            dockerfile: docker/Dockerfile
            context: .
          - image: scanner-bridge
            dockerfile: scanner-bridge/Dockerfile
            context: scanner-bridge
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            SGW_TOKEN=${{ secrets.SGW_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64

  shdg:
    name: shdg ${{ matrix.target.os }}/${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: amd64, archive: tar.gz, ext: "" }
          - { os: linux,   arch: arm64, archive: tar.gz, ext: "" }
          - { os: darwin,  arch: amd64, archive: tar.gz, ext: "" }
          - { os: darwin,  arch: arm64, archive: tar.gz, ext: "" }
          - { os: windows, arch: amd64, archive: zip,    ext: ".exe" }
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: Resolve version + commit
        id: meta
        run: |
          set -eu
          # Strip the `v` prefix so shdg's runtime version matches the Docker
          # tag (`shieldoo-gate:1.2.3` and `shdg version` → `1.2.3`).
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short HEAD)"
          stem="shdg-${version}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          echo "version=${version}"   >> "$GITHUB_OUTPUT"
          echo "commit=${commit}"     >> "$GITHUB_OUTPUT"
          echo "stem=${stem}"         >> "$GITHUB_OUTPUT"

      # CGO is off — shdg is stdlib-only, so a static cross-compile from a
      # Linux runner produces deterministic binaries for every target.
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          set -eu
          mkdir -p dist
          out="dist/shdg${{ matrix.target.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.meta.outputs.version }} -X main.Commit=${{ steps.meta.outputs.commit }}" \
            -o "${out}" \
            ./cmd/shdg
          ls -la dist/

      - name: Package
        id: package
        run: |
          set -eu
          stem="${{ steps.meta.outputs.stem }}"
          cd dist
          if [ "${{ matrix.target.archive }}" = "zip" ]; then
            archive="${stem}.zip"
            zip -q "${archive}" "shdg${{ matrix.target.ext }}"
          else
            archive="${stem}.tar.gz"
            tar -czf "${archive}" "shdg${{ matrix.target.ext }}"
          fi
          sha256sum "${archive}" | tee "${archive}.sha256"
          echo "archive=${archive}"        >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shdg-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            dist/${{ steps.package.outputs.archive }}
            dist/${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  vuln-scan:
    # Dogfood: every release uploads a CycloneDX SBOM of each Shieldoo Gate
    # component to the production gate itself, gating the release on new
    # high-or-worse findings. Uses the freshly-built shdg from the `shdg` job
    # (linux-amd64 artifact) — no chicken-and-egg with previous releases.
    name: Vuln-scan ${{ matrix.component.name }}
    needs: [docker, shdg]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: ui,             dir: ui,             ecosystem: npm  }
          - { name: gate,           dir: ".",            ecosystem: go   }
          - { name: scanner-bridge, dir: scanner-bridge, ecosystem: pypi }
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download shdg (linux-amd64)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: shdg-linux-amd64
          path: shdg-dist

      - name: Install shdg
        run: |
          set -eu
          tar -xzf shdg-dist/shdg-*-linux-amd64.tar.gz -C shdg-dist
          chmod +x shdg-dist/shdg
          echo "${PWD}/shdg-dist" >> "$GITHUB_PATH"
          shdg-dist/shdg version

      # SGW_TOKEN is the global super-token (`*` scope) — covers `scan:upload`.
      # Each call writes a `super_token_used` audit row by design (CLAUDE.md
      # security invariant #6); release-time entries are expected and traceable.
      # Project label `shieldoo-gate` matches SGW_USER in docker/Dockerfile.
      - name: Scan ${{ matrix.component.name }}
        env:
          SHIELDOO_URL:   ${{ vars.SHIELDOO_URL }}
          SHIELDOO_TOKEN: ${{ secrets.SGW_TOKEN }}
        run: |
          # --skip-dirs excludes example projects (intentionally pinned to old
          # versions for demo/E2E) and tests/ from the gate (dir=.) scan so they
          # do not pollute the shieldoo-gate component's dashboard.
          shdg scan \
            --project   shieldoo-gate \
            --component ${{ matrix.component.name }} \
            --dir       ${{ matrix.component.dir }} \
            --ecosystem ${{ matrix.component.ecosystem }} \
            --skip-dirs examples,tests \
            --wait --fail-on high --timeout 10m

  vuln-scan-image:
    # Container-level dogfood: scan the freshly-built ghcr.io images via
    # `shdg --image` (shells out to `trivy image`). Catches base-image OS
    # CVEs (debian/alpine packages, openssl, etc.) that the source-tree
    # vuln-scan above cannot see — those only surface inside the final
    # container layers. Tracked as separate components `<image>-image`
    # so source-level and image-level findings stay distinguishable in
    # the dashboard.
    name: Vuln-scan image ${{ matrix.image.name }}
    needs: [docker, shdg]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: gate-image,           ref: shieldoo-gate }
          - { name: scanner-bridge-image, ref: scanner-bridge }
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GitHub Container Registry
        # Trivy reads docker creds from ~/.docker/config.json to pull the
        # ghcr.io image during scan; the docker/login-action writes that file.
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download shdg (linux-amd64)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: shdg-linux-amd64
          path: shdg-dist

      - name: Install shdg
        run: |
          set -eu
          tar -xzf shdg-dist/shdg-*-linux-amd64.tar.gz -C shdg-dist
          chmod +x shdg-dist/shdg
          echo "${PWD}/shdg-dist" >> "$GITHUB_PATH"
          shdg-dist/shdg version

      - name: Scan image ${{ matrix.image.ref }}:${{ needs.docker.outputs.version }}
        env:
          SHIELDOO_URL:   ${{ vars.SHIELDOO_URL }}
          SHIELDOO_TOKEN: ${{ secrets.SGW_TOKEN }}
        run: |
          # Image scans gate on `critical`, not `high`. Container base-image OS
          # packages (Debian/alpine: kernel headers, ncurses, perl, libssh2,
          # mbedtls, …) produce a continuous stream of HIGH CVEs that usually
          # have no upstream fix at release time (fixed_version empty), so gating
          # releases on them blocks shipping through no fault of our code. High
          # base-image CVEs are handled by periodic base-image bumps, not by
          # release-blocking. CRITICALs still fail the build. The source-tree
          # vuln-scan job above keeps `--fail-on high` — those are our own deps
          # and are actionable.
          shdg scan \
            --project   shieldoo-gate \
            --component ${{ matrix.image.name }} \
            --image     ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.ref }}:${{ needs.docker.outputs.version }} \
            --ecosystem docker \
            --wait --fail-on critical --timeout 15m

  release:
    name: GitHub release
    needs: [docker, shdg, vuln-scan, vuln-scan-image]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # need full history for changelog

      - name: Download shdg artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: shdg-*
          merge-multiple: true

      - name: Aggregate checksums
        id: assets
        run: |
          set -eu
          mkdir -p release
          # Move archives + per-file checksums into a flat release/ dir, and
          # collapse all the per-file *.sha256 stubs into a single SHA256SUMS
          # file (the conventional format users feed into `sha256sum -c`).
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ( cd release && sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS )
          echo "--- release/ ---"
          ls -la release/
          echo "--- SHA256SUMS ---"
          cat release/SHA256SUMS

      - name: Build release notes
        id: notes
        env:
          VERSION: ${{ needs.docker.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          # Two distinct identifiers are needed below:
          #   * tag (with v) — used as a git ref for `git log <prev>..<tag>`,
          #     because annotated tags are stored as `v1.2.3`
          #   * VERSION (no v) — used in user-facing strings (Docker tags,
          #     archive filenames) so all release artifacts agree
          tag="${GITHUB_REF_NAME}"
          previous="$(git tag --sort=-creatordate | grep -vFx "${tag}" | head -n1 || true)"
          if [ -z "${previous}" ]; then
            range="$(git rev-list --max-parents=0 HEAD | head -n1)..HEAD"
            range_label="initial release"
          else
            range="${previous}..${tag}"
            range_label="${previous}…${tag}"
          fi

          {
            echo "## Docker images"
            echo ""
            echo "Pull the matching ghcr.io tag:"
            echo ""
            echo '```bash'
            echo "docker pull ${REGISTRY}/${REPO_OWNER}/shieldoo-gate:${VERSION}"
            echo "docker pull ${REGISTRY}/${REPO_OWNER}/scanner-bridge:${VERSION}"
            echo '```'
            echo ""
            echo "Image pages:"
            echo "- [shieldoo-gate](https://github.com/${REPO_OWNER}/shieldoo-gate/pkgs/container/shieldoo-gate)"
            echo "- [scanner-bridge](https://github.com/${REPO_OWNER}/shieldoo-gate/pkgs/container/scanner-bridge)"
            echo ""
            echo "## shdg CLI"
            echo ""
            echo "Push-from-CI client. Pre-built for Linux, macOS, and Windows:"
            echo ""
            echo "| OS | Arch | Archive |"
            echo "|---|---|---|"
            echo "| Linux   | x86_64  | shdg-${VERSION}-linux-amd64.tar.gz |"
            echo "| Linux   | aarch64 | shdg-${VERSION}-linux-arm64.tar.gz |"
            echo "| macOS   | Intel   | shdg-${VERSION}-darwin-amd64.tar.gz |"
            echo "| macOS   | Apple Silicon | shdg-${VERSION}-darwin-arm64.tar.gz |"
            echo "| Windows | x86_64  | shdg-${VERSION}-windows-amd64.zip |"
            echo ""
            echo "\`shdg version\` reports \`${VERSION}\` to match the Docker tag."
            echo "Verify archive integrity with \`SHA256SUMS\` (also attached)."
            echo ""
            echo "## Changes (${range_label})"
            echo ""
            git log --pretty=format:"- %s (%h)" "${range}"
            echo ""
          } > release/RELEASE_NOTES.md

          echo "--- RELEASE_NOTES.md ---"
          cat release/RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/shdg-*.tar.gz
            release/shdg-*.zip
            release/SHA256SUMS
          fail_on_unmatched_files: true
