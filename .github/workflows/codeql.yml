name: Security scan

# CodeQL (SAST) for Go + the React/TS UI, plus govulncheck (Go-native CVE
# scan against the Go vulnerability database). Runs on PRs and pushes to main
# so regressions are caught at review time, and weekly so newly-disclosed
# CVEs in already-merged code still surface.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Mondays 07:17 UTC — off-the-hour to avoid GitHub's cron contention.
    - cron: "17 7 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.4"

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # CodeQL builds Go itself via autobuild; set up the pinned toolchain so it
      # matches go.mod rather than the runner default.
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:${{ matrix.language }}"

  govulncheck:
    name: govulncheck (Go CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      # Pinned per CLAUDE.md (no floating versions). Bump deliberately.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.4.0

      - name: Run govulncheck
        run: govulncheck ./...
