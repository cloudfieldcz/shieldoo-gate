name: Scorecard supply-chain security

# OpenSSF Scorecard — scores this repo against supply-chain best practices
# (branch protection, pinned dependencies, token permissions, signed releases,
# dangerous workflow patterns, …) and publishes the result so the README badge
# and deps.dev reflect it. For a supply-chain security tool, this score is the
# public credibility metric.
#
# Triggers:
#   - branch_protection_rule — re-score whenever branch protection changes
#     (the Branch-Protection check is the highest-weighted control).
#   - schedule (weekly) — re-score against newly-added Scorecard checks and
#     changes that don't touch protection rules.
#   - push to main — keep the published score current after every merge.
#   - pull_request — let a PR prove the workflow is green before merge; publish
#     is gated off for PRs (the public score must come from the default branch).
on:
  branch_protection_rule:
  schedule:
    # Mondays 06:42 UTC — off-the-hour and distinct from codeql.yml (07:17) to
    # avoid GitHub's cron contention.
    - cron: "42 6 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege at the top level; the analysis job widens only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # OIDC for publish_results (Sigstore-backed)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public Scorecard API — required for the README badge
          # and deps.dev. Only meaningful on the default branch, so it is gated
          # off for pull_request runs (which exist only to verify the workflow).
          publish_results: ${{ github.event_name != 'pull_request' }}

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
