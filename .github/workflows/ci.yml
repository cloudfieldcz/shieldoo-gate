name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: PR CI only reads the repo. No package/content writes here —
# that belongs to release.yml. Do NOT add secrets such as SGW_TOKEN/SGW_USER:
# the Makefile reroutes GOPROXY through the production gate when SGW_TOKEN is
# set, which 403s for unauthenticated CI and breaks `make build`.
permissions:
  contents: read

# A newer push to the same PR/branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in lockstep with go.mod's `go` directive and docker/Dockerfile.
  GO_VERSION: "1.26.5"
  # Keep in lockstep with docker/Dockerfile's node base image.
  NODE_VERSION: "20.19.0"

jobs:
  go:
    name: Go build / vet / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      # `make build` compiles both binaries; go-sqlite3 and `go test -race`
      # need CGO — gcc is present on ubuntu-latest by default.
      - name: Build
        run: make build

      - name: Lint (go vet)
        run: make lint

      - name: Test
        run: make test

  ui:
    name: UI lint / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # `npm ci` installs the exact pinned tree from package-lock.json.
      - name: Install
        working-directory: ui
        run: npm ci

      - name: Lint (eslint)
        working-directory: ui
        run: npm run lint

      # `npm run build` runs `tsc` first — this is the type-check gate.
      - name: Build (tsc + vite)
        working-directory: ui
        run: npm run build

  ui-e2e:
    name: UI e2e (visual + flows)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Brings up its own fresh open-mode gate and runs the Playwright suite
      # (ui/e2e) inside the pinned Playwright container, comparing against the
      # committed baselines in ui/e2e/__screenshots__. The container is the same
      # one used to generate baselines locally, so rendering is byte-identical.
      # Separate from the shell e2e (make test-e2e-containerized).
      - name: Run UI test suite
        run: make test-ui

      # On a visual diff or flow failure, publish the Playwright HTML report
      # (diff images + traces) so the regression is inspectable.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: ui/playwright-report
          if-no-files-found: ignore
          retention-days: 7
