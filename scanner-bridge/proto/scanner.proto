// scanner-bridge/proto/scanner.proto
syntax = "proto3";
package scanner;

option go_package = "github.com/cloudfieldcz/shieldoo-gate/internal/scanner/guarddog/proto";

service ScannerBridge {
    rpc ScanArtifact(ScanRequest) returns (ScanResponse);
    rpc ScanArtifactAI(AIScanRequest) returns (AIScanResponse);
    rpc TriageFindings(TriageRequest) returns (TriageResponse);
    rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message AIScanRequest {
    string artifact_id        = 1;   // "ecosystem:name:version"
    string ecosystem          = 2;   // pypi, npm, nuget, maven, rubygems
    string name               = 3;
    string version            = 4;
    string local_path         = 5;   // path to downloaded artifact on disk
    string original_filename  = 6;   // original filename (e.g. "requests-2.32.3-py3-none-any.whl")
}

message AIScanResponse {
    string verdict            = 1;  // "CLEAN" | "SUSPICIOUS" | "MALICIOUS" | "UNKNOWN"
    float  confidence         = 2;  // 0.0–1.0
    repeated string findings  = 3;  // e.g. ["base64+exec in .pth", "network call to non-registry host"]
    string explanation        = 5;  // human-readable summary
    string model_used         = 6;  // e.g. "gpt-5.4-mini"
    int32  tokens_used        = 7;  // for monitoring
}

message ScanRequest {
    string artifact_path = 1;
    string ecosystem = 2;
    string package_name = 3;
    string version = 4;
}

message ScanResponse {
    string verdict = 1;
    float confidence = 2;
    repeated Finding findings = 3;
    string scanner_version = 4;
    int64 duration_ms = 5;
}

message Finding {
    string severity = 1;
    string category = 2;
    string description = 3;
    string location = 4;
    repeated string iocs = 5;
}

message TriageRequest {
    string ecosystem             = 1;
    string name                  = 2;
    string version               = 3;
    repeated Finding findings    = 4;  // reuse existing Finding message
}

message TriageResponse {
    string decision    = 1;  // "ALLOW" | "QUARANTINE"
    float  confidence  = 2;
    string explanation = 3;  // human-readable reasoning for audit log (max 500 chars)
    string model_used  = 4;
    int32  tokens_used = 5;
}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string version = 2;
}
