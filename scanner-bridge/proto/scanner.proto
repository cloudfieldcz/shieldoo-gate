// scanner-bridge/proto/scanner.proto
syntax = "proto3";
package scanner;

option go_package = "github.com/cloudfieldcz/shieldoo-gate/internal/scanner/guarddog/proto";

service ScannerBridge {
    rpc ScanArtifact(ScanRequest) returns (ScanResponse);
    rpc ScanArtifactAI(AIScanRequest) returns (AIScanResponse);
    rpc ScanArtifactDiff(DiffScanRequest) returns (DiffScanResponse);
    rpc TriageFindings(TriageRequest) returns (TriageResponse);
    rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message AIScanRequest {
    string artifact_id        = 1;   // "ecosystem:name:version"
    string ecosystem          = 2;   // pypi, npm, nuget, maven, rubygems
    string name               = 3;
    string version            = 4;
    string local_path         = 5;   // path to downloaded artifact on disk
    string original_filename  = 6;   // original filename (e.g. "requests-2.32.3-py3-none-any.whl")
}

message AIScanResponse {
    string verdict            = 1;  // "CLEAN" | "SUSPICIOUS" | "MALICIOUS" | "UNKNOWN"
    float  confidence         = 2;  // 0.0–1.0
    repeated string findings  = 3;  // e.g. ["base64+exec in .pth", "network call to non-registry host"]
    string explanation        = 5;  // human-readable summary
    string model_used         = 6;  // e.g. "gpt-5.4-mini"
    int32  tokens_used        = 7;  // for monitoring
}

message ScanRequest {
    string artifact_path = 1;
    string ecosystem = 2;
    string package_name = 3;
    string version = 4;
}

message ScanResponse {
    string verdict = 1;
    float confidence = 2;
    repeated Finding findings = 3;
    string scanner_version = 4;
    int64 duration_ms = 5;
}

message Finding {
    string severity = 1;
    string category = 2;
    string description = 3;
    string location = 4;
    repeated string iocs = 5;
}

message TriageRequest {
    string ecosystem             = 1;
    string name                  = 2;
    string version               = 3;
    repeated Finding findings    = 4;  // reuse existing Finding message
}

message TriageResponse {
    string decision    = 1;  // "ALLOW" | "QUARANTINE"
    float  confidence  = 2;
    string explanation = 3;  // human-readable reasoning for audit log (max 500 chars)
    string model_used  = 4;
    int32  tokens_used = 5;
}

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string version = 2;
}

message DiffScanRequest {
    string artifact_id            = 1;
    string ecosystem              = 2;   // pypi, npm, nuget, maven, rubygems, go (go added vs AIScanRequest — diff scanning supported for Go modules)
    string name                   = 3;
    string version                = 4;
    string previous_version       = 5;
    string local_path             = 6;   // path to NEW artifact on disk (in shared volume)
    string previous_path          = 7;   // path to PREVIOUS artifact on disk
    string original_filename      = 8;   // original filename of the NEW artifact (e.g. "requests-2.32.3-py3-none-any.whl")
    string local_path_sha256      = 9;   // expected hash, bridge re-verifies before extraction (TOCTOU)
    string previous_path_sha256   = 10;  // expected hash, bridge re-verifies before extraction
    string prompt_version         = 11;  // SHA256[:12] of system prompt — bridge attaches to response
}

message DiffScanResponse {
    string verdict          = 1;   // CLEAN | SUSPICIOUS | MALICIOUS | UNKNOWN
    float  confidence       = 2;
    repeated string findings = 3;
    string explanation      = 4;
    string model_used       = 5;
    int32  tokens_used      = 6;
    int32  files_added      = 7;   // counts so Go can persist without re-parsing payload
    int32  files_modified   = 8;
    int32  files_removed    = 9;
    string prompt_version   = 10;  // SHA256[:12] of system prompt at scan time — Go uses for idempotency cache key (so prompt edits invalidate cache)
    bool   input_truncated  = 11;  // bridge sets true when token budget cut content; Go uses for confidence cap defense-in-depth
}
