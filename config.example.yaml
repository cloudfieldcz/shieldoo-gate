# config.example.yaml — Shieldoo Gate v1.1 reference configuration

server:
  host: "0.0.0.0"

ports:
  pypi: 5000
  npm: 4873
  nuget: 5001
  docker: 5002
  maven: 8085
  rubygems: 8086
  gomod: 8087
  admin: 8080

upstreams:
  pypi: "https://pypi.org"
  npm: "https://registry.npmjs.org"
  nuget: "https://api.nuget.org"
  maven: "https://repo1.maven.org/maven2"
  maven_resolver:
    enabled: true                    # resolve licenses from parent POM chain (fail-open)
    cache_size: 4096                 # in-memory LRU entries for parent POMs
    cache_ttl: "24h"                 # parent POMs are immutable per release GAV
    max_depth: 5                     # max parent chain depth (hardcode ceiling: 10)
    fetch_timeout: "3s"              # per-POM HTTP timeout
    resolver_timeout: "5s"           # total timeout for entire parent chain walk
  rubygems: "https://rubygems.org"
  gomod: "https://proxy.golang.org"
  docker:
    default_registry: "https://registry-1.docker.io"
    allowed_registries:
      - host: "ghcr.io"
        url: "https://ghcr.io"
      - host: "quay.io"
        url: "https://quay.io"
    sync:
      enabled: true
      interval: "6h"
      rescan_interval: "24h"
      max_concurrent: 3
    push:
      enabled: false

cache:
  backend: "local"                 # "local" (default), "s3", "azure_blob", or "gcs"
  local:
    path: "/var/cache/shieldoo-gate"
    max_size_gb: 50
  s3:
    bucket: ""                     # S3 bucket name (required when backend is "s3")
    region: "us-east-1"            # AWS region (required unless endpoint is set)
    endpoint: ""                   # Custom endpoint for MinIO / S3-compatible services
    prefix: ""                     # Optional key prefix for all objects
    force_path_style: false        # Set true for MinIO / S3-compatible services
    access_key_env: ""             # Env var name for AWS access key (optional; defaults to AWS credential chain)
    secret_key_env: ""             # Env var name for AWS secret key (optional; defaults to AWS credential chain)
  azure_blob:
    account_name: ""               # Azure storage account name (required unless connection_string_env is set)
    container_name: ""             # Blob container name (required when backend is "azure_blob")
    connection_string_env: ""      # Env var name holding Azure Storage connection string (optional)
    prefix: ""                     # Optional key prefix for all blobs
  gcs:
    bucket: ""                     # GCS bucket name (required when backend is "gcs")
    credentials_file: ""           # Path to service account JSON (optional; defaults to GOOGLE_APPLICATION_CREDENTIALS)
    prefix: ""                     # Optional key prefix for all objects
  ttl:
    pypi: "168h"
    npm: "168h"
    nuget: "168h"
    docker: "720h"

database:
  backend: "sqlite"
  sqlite:
    path: "/var/lib/shieldoo-gate/gate.db"
  postgres:
    # DSN should be provided via environment variable SGW_DATABASE_POSTGRES_DSN
    # to avoid committing credentials to version control.
    dsn: ""
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: "5m"

scanners:
  parallel: true
  timeout: "60s"                          # outer cap per scanner per artifact; default 60s.
                                          # Invariant: must be >= scanners.version_diff.scanner_timeout + 5s buffer
                                          # whenever version_diff is enabled (validated at startup).
  guarddog:
    enabled: true
    bridge_socket: "/tmp/shieldoo-bridge.sock"
  trivy:
    enabled: true
    binary: "trivy"
    cache_dir: "/var/cache/trivy"
  osv:
    enabled: true
    api_url: "https://api.osv.dev"
  # AI scanner (LLM-based). Uses Azure OpenAI gpt-5.4-mini to analyze install-time
  # scripts for malicious patterns. Synchronous, opt-in. Requires AI_SCANNER_API_KEY env var.
  ai:
    enabled: false
    provider: "azure_openai"             # "azure_openai" (default) or "openai"
    model: "gpt-5.4-mini"
    api_key_env: "AI_SCANNER_API_KEY"    # env var name holding the API key
    timeout: "15s"                       # timeout per LLM API call
    max_input_tokens: 32000
    bridge_socket: "/tmp/shieldoo-bridge.sock"
    # Azure OpenAI settings (when provider is "azure_openai"):
    azure_endpoint: ""                   # e.g. "https://<instance>.openai.azure.com/"
    azure_deployment: "gpt-54-mini"      # Azure deployment name
  # Dynamic sandbox scanner (gVisor). Runs asynchronously after artifact is served.
  # Requires Linux with gVisor (runsc) installed. Disabled by default.
  sandbox:
    enabled: false
    runtime_binary: "runsc"          # path to gVisor runtime binary
    timeout: "30s"                   # per-sandbox execution timeout
    network_policy: "none"           # "none" (no network) or "monitor" (DNS/HTTP logging)
    max_concurrent: 2                # max concurrent sandbox executions
  # Typosquatting & namespace confusion detection. Built-in scanner that checks
  # package names against popular packages using edit distance, homoglyph detection,
  # combosquatting, and namespace confusion. Enabled by default, no external dependencies.
  typosquat:
    enabled: true
    top_packages_count: 5000          # protect top N packages per ecosystem (max 10000)
    max_edit_distance: 2              # flag names within this distance (1-3)
    internal_namespaces: []           # e.g. ["@mycompany/", "mycompany-"]
    combosquat_suffixes:              # suffixes to check for combosquatting
      - "-utils"
      - "-helper"
      - "-lib"
      - "-dev"
      - "-tool"
      - "-sdk"
    allowlist: []                     # package names to skip (false positive suppression)
  # AI-driven version diff scanner (v2.0+). Compares each new package version
  # against the most recent CLEAN/SUSPICIOUS cached version, sends both to the
  # scanner-bridge over gRPC, and asks the LLM (gpt-5.4-mini default) whether
  # the changes show malicious supply-chain intent. Replaces the heuristic
  # version_diff scanner — config keys with `thresholds:` / `entropy_sample_bytes`
  # / `sensitive_patterns:` are now ignored.
  #
  # FIRST ACTIVATION: leave `mode: "shadow"` for at least 7 days. The scanner
  # will run on every applicable artifact and persist results to
  # `version_diff_results`, but its verdict will be forced to CLEAN so the
  # policy engine ignores it. Operators can then evaluate FP/FN rate and AI
  # cost before flipping to `mode: "active"`.
  #
  # TRUST BOUNDARY: install hooks and top-level executable code from BOTH
  # versions of the package leave the gate node and are sent to Azure OpenAI
  # for analysis (after secret-pattern redaction). For on-prem deployments
  # with strict no-egress requirements, set `enabled: false`.
  version_diff:
    enabled: false                      # opt-in; requires scanner-bridge with AI enabled
    mode: "shadow"                      # "shadow" (no policy effect) | "active" (verdict reaches policy)
    max_artifact_size_mb: 50            # skip diff for artifacts larger than this (compressed)
    max_extracted_size_mb: 50           # bridge: max aggregate bytes read across all members
    max_extracted_files: 5000           # bridge: max member count
    scanner_timeout: "55s"              # must be < scanners.timeout (engine outer cap, default 60s)
    bridge_socket: ""                   # empty -> reuse scanners.guarddog.bridge_socket
    allowlist: []                       # package names to skip (FP suppression)
    min_confidence: 0.6                 # SUSPICIOUS below this is downgraded to CLEAN with audit_log entry
    per_package_rate_limit: 10          # max LLM calls per package per hour; 0 = unlimited
    daily_cost_limit_usd: 5.0           # alerting / future hard-cap; soft signal in v2.0
    circuit_breaker_threshold: 5        # consecutive bridge errors trigger 60s degraded mode
  # Maintainer reputation & package risk scoring. Queries upstream registry APIs
  # for metadata (maintainer history, publication patterns, download counts) and
  # produces a composite risk score. Fail-open: metadata fetch errors never block.
  reputation:
    enabled: false                      # opt-in; queries upstream APIs for each new package
    cache_ttl: "24h"                    # cache metadata for this long before re-fetching
    cache_ttl_jitter: "2h"             # random jitter added to TTL (prevents thundering herd)
    timeout: "10s"                      # per-upstream-API request timeout
    rate_limit: 30                      # max upstream API requests per minute per ecosystem
    retention_days: 30                  # delete stale reputation entries older than this
    thresholds:
      suspicious: 0.5                   # score >= this → SUSPICIOUS verdict
      malicious: 0.8                    # score >= this (capped at SUSPICIOUS per convention)
    signals:
      # V1 signals
      package_age:
        enabled: true
        weight: 0.3                     # packages less than 30 days old
      low_downloads:
        enabled: true
        weight: 0.2                     # fewer than 100 downloads
      no_source_repo:
        enabled: true
        weight: 0.3                     # no source repository linked
      dormant_reactivation:
        enabled: true
        weight: 0.7                     # 12+ months inactive, then new version
      few_versions:
        enabled: true
        weight: 0.15                    # only 1 version published
      no_description:
        enabled: true
        weight: 0.1                     # no package description
      version_count_spike:
        enabled: true
        weight: 0.4                     # 10+ versions in 7 days
      ownership_change:
        enabled: true
        weight: 0.8                     # maintainer list changed recently
      # V2 signals
      yanked_versions:
        enabled: true
        weight: 0.6                     # previous versions were yanked/deleted
      unusual_versioning:
        enabled: true
        weight: 0.2                     # version numbers like 99.0.0 or 0.0.1
      maintainer_email_domain:
        enabled: true
        weight: 0.15                    # all maintainer emails use free providers
      first_publication:
        enabled: true
        weight: 0.25                    # maintainer has published only this package
      repo_mismatch:
        enabled: false                  # source repo name doesn't match package (requires tuning)
        weight: 0.4
      classifier_anomaly:
        enabled: false                  # package classifiers appear inconsistent (requires tuning)
        weight: 0.15

policy:
  mode: ""                             # "strict" (default) | "balanced" | "permissive"
  block_if_verdict: "MALICIOUS"
  quarantine_if_verdict: "SUSPICIOUS"  # ignored when mode is set
  minimum_confidence: 0.7              # scanner confidence threshold for aggregator
  behavioral_minimum_confidence: 0.35  # lower threshold for behavioral scanners (default: minimum_confidence / 2)
  ai_triage:                           # AI-assisted triage for balanced mode
    enabled: false
    timeout: "5s"                      # per-call timeout (no retries)
    min_confidence: 0.7                # triage decision trust threshold
    cache_ttl: "168h"                  # 7 days
    rate_limit: 10                     # max triage calls per minute
    circuit_breaker_threshold: 5       # consecutive failures before cooldown
    circuit_breaker_cooldown: "60s"
  allowlist:
    - "pypi:litellm:==1.82.6"
  tag_mutability:
    enabled: true
    action: "warn"                   # "quarantine" | "warn" | "block"
    exclude_tags: ["latest", "nightly", "dev"]
    check_on_cache_hit: false        # adds latency to cache hits; use rescan scheduler instead
  # License policy — blocks/warns artifacts based on SPDX IDs extracted
  # from the SBOM. Requires sbom.enabled=true. See docs/features/license-policy.md.
  licenses:
    enabled: false
    blocked: []                      # e.g. ["GPL-3.0-only", "AGPL-3.0-only"]
    warned:  []                      # e.g. ["LGPL-2.1-only", "MPL-2.0"]
    allowed: []                      # Non-empty enables whitelist mode
    unknown_action: "allow"          # "allow" | "warn" | "block"
    on_sbom_error: "allow"           # Action when SBOM unavailable (Trivy timeout, pre-SBOM artifact, etc.)
    or_semantics: "any_allowed"      # "any_allowed" | "all_allowed" — SPDX OR expression evaluation

threat_feed:
  enabled: true
  url: "https://feed.shieldoo.io/malicious-packages.json"
  refresh_interval: "1h"

rescan:
  enabled: true
  interval: "24h"                  # How often the scheduler checks for pending rescans
  batch_size: 100                  # Max artifacts per cycle
  max_concurrent: 5                # Max parallel scans

# Public-facing URLs for each ecosystem proxy, displayed in the admin UI
# usage instructions. When empty, the UI shows generic <host>:port placeholders.
# Can be overridden via env vars: SGW_PUBLIC_URLS_PYPI, SGW_PUBLIC_URLS_NPM, etc.
public_urls:
  pypi: ""                             # e.g. "https://pypi.gate.example.com"
  npm: ""                              # e.g. "https://npm.gate.example.com"
  nuget: ""                            # e.g. "https://nuget.gate.example.com"
  docker: ""                           # e.g. "https://cr.gate.example.com"
  maven: ""                            # e.g. "https://maven.gate.example.com"
  rubygems: ""                         # e.g. "https://gems.gate.example.com"
  gomod: ""                            # e.g. "https://go.gate.example.com"

log:
  level: "info"
  format: "text"    # "text" for human-readable, "json" for structured logging

# OIDC authentication for admin API (opt-in, disabled by default).
# When disabled, the admin API is fully open — suitable for development/testing.
# In production, set enabled: true and configure your OIDC provider.
auth:
  enabled: false
  issuer_url: ""                     # OIDC provider URL, e.g. "https://accounts.google.com"
  client_id: ""                      # OAuth2 client ID from your OIDC provider
  client_secret_env: "SGW_OIDC_CLIENT_SECRET"  # Env var holding the client secret
  redirect_url: ""                   # e.g. "https://shieldoo-gate.example.com:8080/auth/callback"
  scopes: ["openid", "email", "profile"]

# API key authentication for proxy endpoints (pip, npm, docker, nuget, gem, go).
# When disabled (default), proxy endpoints are open — protected by network segmentation only.
# When enabled, all proxy requests require a valid API key via HTTP Basic Auth.
# Keys are either per-user PATs (generated via admin API) or a global shared token.
proxy_auth:
  enabled: false
  global_token_env: "SGW_PROXY_TOKEN"  # Env var holding the global shared token (optional)

# Project registry — per-team / per-service segmentation of proxy usage.
# The Basic auth USERNAME is interpreted as the project label (lowercased +
# regex-validated). See docs/features/projects.md.
projects:
  mode: "lazy"                 # "lazy" (auto-create) | "strict" (reject unknown)
  default_label: "default"     # Fallback for empty Basic auth username
  # label_regex: ""            # Optional custom regex (default: ^[a-z0-9][a-z0-9_-]{0,63}$)
  max_count: 1000              # Hard cap (0 = unlimited)
  lazy_create_rate: 10         # New projects per hour per identity (PAT hash)
  cache_size: 512              # LRU cache entries (hot-path optimization)
  cache_ttl: "5m"              # LRU entry TTL
  usage_flush_period: "30s"    # Debounced upsert interval for artifact_project_usage
  # Bootstrap labels — pre-provisioned on every startup (idempotent). Required
  # for strict mode + ad-hoc clients (CI, build pipelines) that can't POST
  # /projects themselves. Lazy mode would auto-create on first use, but listing
  # them here also makes the registry browsable in the admin UI before any
  # traffic flows.
  bootstrap_labels:
    - default
    - shieldoo-gate          # used by docker/Dockerfile (SGW_USER) for self-build dogfood
    - ci-bot                 # generic CI/E2E identity

# SBOM generation — when enabled, Trivy emits CycloneDX output including
# licenses. See docs/features/sbom-generation.md.
sbom:
  enabled: false               # Set true to generate + persist CycloneDX SBOMs
  format: "cyclonedx-json"
  async_write: true            # Write blob in a goroutine (don't block request path)
  ttl: "30d"                   # Retention hint (cleanup scheduler TBD)

alerts:
  webhook:
    enabled: false
    url: "https://hooks.example.com/shieldoo"
    secret_env: "SGW_WEBHOOK_SECRET"
    allow_insecure: false
    on: ["BLOCKED", "QUARANTINED", "TAG_MUTATED"]
  slack:
    enabled: false
    webhook_env: "SGW_SLACK_WEBHOOK_URL"
    on: ["BLOCKED", "QUARANTINED"]
  email:
    enabled: false
    host: "smtp.example.com"
    port: 587
    from: "shieldoo@example.com"
    to: ["security@example.com"]
    username_env: "SGW_SMTP_USER"
    password_env: "SGW_SMTP_PASS"
    use_tls: true
    tls_skip_verify: false
    batch_interval: "30s"
    on: ["QUARANTINED", "TAG_MUTATED"]
