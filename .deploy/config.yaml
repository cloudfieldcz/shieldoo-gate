# Shieldoo Gate — Production configuration
# Secrets are injected via environment variables (see .env)

server:
  host: "0.0.0.0"

ports:
  pypi: 5000
  npm: 4873
  nuget: 5001
  docker: 5002
  maven: 8085
  rubygems: 8086
  gomod: 8087
  admin: 8080

upstreams:
  pypi: "https://pypi.org"
  npm: "https://registry.npmjs.org"
  nuget: "https://api.nuget.org"
  maven: "https://repo1.maven.org/maven2"
  maven_resolver:
    enabled: true
  rubygems: "https://rubygems.org"
  gomod: "https://proxy.golang.org"
  docker:
    default_registry: "https://registry-1.docker.io"
    allowed_registries:
      - host: "ghcr.io"
        url: "https://ghcr.io"
      - host: "quay.io"
        url: "https://quay.io"
    sync:
      enabled: false
    push:
      enabled: false

cache:
  backend: "azure_blob"
  azure_blob:
    account_name: ""              # via SGW_CACHE_AZURE_BLOB_ACCOUNT_NAME env var
    container_name: "cache"
    connection_string_env: "SGW_AZURE_STORAGE_CONNECTION_STRING"
    prefix: ""
  local:
    path: "/var/cache/shieldoo-gate"
    max_size_gb: 30
  ttl:
    pypi: "168h"
    npm: "168h"
    nuget: "168h"
    docker: "720h"

database:
  backend: "postgres"
  postgres:
    # DSN injected via SGW_DATABASE_POSTGRES_DSN env var
    dsn: ""
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: "5m"

scanners:
  parallel: true
  timeout: "60s"
  guarddog:
    enabled: true
    bridge_socket: "/tmp/shieldoo-bridge.sock"
  trivy:
    enabled: true
    binary: "trivy"
    cache_dir: "/var/cache/trivy"
  osv:
    enabled: true
    api_url: "https://api.osv.dev"
  ai:
    enabled: true
    provider: "azure_openai"
    model: "gpt-5.4-mini"
    api_key_env: "AI_SCANNER_API_KEY"
    timeout: "45s"
    max_input_tokens: 32000
    bridge_socket: "/tmp/shieldoo-bridge.sock"
    azure_endpoint: ""                   # via AI_SCANNER_AZURE_ENDPOINT env var
    azure_deployment: "gpt-54-mini"      # via AI_SCANNER_AZURE_DEPLOYMENT env var
  sandbox:
    enabled: false

policy:
  mode: "balanced"
  block_if_verdict: "MALICIOUS"
  quarantine_if_verdict: "SUSPICIOUS"
  minimum_confidence: 0.7
  ai_triage:
    enabled: true
    timeout: "5s"
    min_confidence: 0.7
    cache_ttl: "168h"
    rate_limit: 10
    circuit_breaker_threshold: 5
    circuit_breaker_cooldown: "60s"
  allowlist: []
  tag_mutability:
    enabled: true
    action: "block"
    exclude_tags: ["latest", "nightly", "dev"]
    check_on_cache_hit: false
  # SPDX-based license policy — runtime-editable from the admin UI.
  # YAML here is the startup fallback; the effective policy can be
  # overridden from the admin UI and persisted to the DB.
  licenses:
    enabled: true
    blocked: []              # seed empty — populate from the UI
    warned: []
    allowed: []
    unknown_action: "allow"  # allow | warn | block
    on_sbom_error: "allow"   # allow | warn | block
    or_semantics: "any_allowed"

threat_feed:
  enabled: true
  url: "https://feed.shieldoo.io/malicious-packages.json"
  refresh_interval: "1h"

rescan:
  enabled: true
  interval: "24h"
  batch_size: 100
  max_concurrent: 5

public_urls:
  # Overridden via SGW_PUBLIC_URLS_* env vars in compose.yaml
  pypi: ""
  npm: ""
  nuget: ""
  docker: ""
  maven: ""
  rubygems: ""
  gomod: ""

log:
  level: "info"
  format: "text"

auth:
  enabled: true
  issuer_url: ""          # via SGW_AUTH_ISSUER_URL env var
  client_id: ""           # via SGW_AUTH_CLIENT_ID env var
  client_secret_env: "SGW_OIDC_CLIENT_SECRET"
  redirect_url: "https://shieldoo-gate.cloudfield.cz/auth/callback"
  scopes: ["openid", "email", "profile"]

proxy_auth:
  enabled: true
  global_token_env: "SGW_PROXY_TOKEN"

# Project registry — strict mode for per-project license policy enforcement.
projects:
  mode: strict
  default_label: default
  max_count: 1000
  lazy_create_rate: 10
  cache_size: 512
  cache_ttl: 5m
  usage_flush_period: 30s
  bootstrap_labels:
    - default
    - shieldoo-gate
    - python-demo
    - npm-demo
    - dotnet-demo
    - maven-demo
    - rubygems-demo
    - go-demo
    - ci-bot

# SBOM generation — CycloneDX JSON from Trivy single-run scan.
sbom:
  enabled: true
  format: cyclonedx-json
  async_write: true

alerts:
  webhook:
    enabled: false
  slack:
    enabled: false
  email:
    enabled: false
