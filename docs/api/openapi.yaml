openapi: 3.1.0
info:
  title: Shieldoo Gate REST API
  description: |
    Administration and observability API for Shieldoo Gate — an open-source
    supply chain security proxy for Docker, PyPI, npm, NuGet, and more.

    ## Authorization scopes

    Authentication establishes *who* you are; scopes decide *what* you may do.
    Every credential carries a scope set:

    - **PAT** (`Authorization: Bearer <token>` on the admin API, or the Basic-auth
      password on the proxy) — scopes from the key's `scopes` column. The session
      cookie holds an opaque server-side session ID, **not** a JWT; OIDC ID tokens
      are no longer accepted on the `Authorization` header (use a PAT for API access).
    - **OIDC session** (cookie) — implicitly granted every defined scope
      (`admin:read,admin:write,keys:manage,proxy:fetch,scan:upload`): a valid operator
      session is full admin and can mint an API key of any scope. Scopes are injected by
      the auth chain (`auth.operatorScopes`).
    - **Global super-token** — scope `*`, bypasses every check (always audited
      via `super_token_used`; the request is rejected if that audit row cannot be written).

    Enforcement:

    - **Admin API** (`/api/v1/*`): the required scope is derived from the HTTP
      method — `GET`/`HEAD`/`OPTIONS` require `admin:read`; `POST`/`PUT`/`PATCH`/
      `DELETE` require `admin:write`. `admin:write` implies `admin:read`.
      Insufficient scope → **403** `{"error":"forbidden","message":"missing scope …"}`.
      The admin API fails closed: scope enforcement is active whenever `auth` **or**
      `proxy_auth` is enabled; only the fully unauthenticated dev mode leaves it open.
    - **API-key management** (`/api/v1/api-keys`): additionally requires `keys:manage`,
      and a key cannot be minted with scopes the caller does not itself hold.
    - **Proxy** (package pulls): require `proxy:fetch`.
    - **Scan-upload**: requires `scan:upload`.
    - **CSRF**: cookie-authenticated mutations must be same-origin (or carry the
      `X-Shieldoo-CSRF` header); token-authenticated requests are exempt.

    Scopes are orthogonal least-privilege roles: only `admin:write ⇒ admin:read`;
    no other implication. A `proxy:fetch`-only token cannot perform admin actions.
  version: 1.2.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development (admin port)

tags:
  - name: health
    description: Service health
  - name: artifacts
    description: Cached artifact management
  - name: audit
    description: Append-only audit log
  - name: overrides
    description: Policy override management
  - name: stats
    description: Request and scan statistics
  - name: feed
    description: Threat feed management
  - name: docker
    description: Docker repository and tag management
  - name: api-keys
    description: API key management for proxy authentication
  - name: auth
    description: OIDC authentication flow
  - name: admin
    description: Administrative actions (policy mode, bulk operations)
  - name: config
    description: Runtime configuration endpoints
  - name: metrics
    description: Prometheus metrics
  - name: vuln-scan
    description: |
      Push-from-CI vulnerability scanning. CI uploads CycloneDX SBOMs per
      Component; OSV + Trivy scan and aggregate findings; admins manage
      ignores and trigger rescans. Routes are registered only when
      `vuln_scan.enabled` is true. Scan-upload uses Bearer-PAT auth with
      `scan:upload` scope; admin reads use the AdminAuthChain (PAT-Bearer
      first, OIDC cookie fallback) with `admin:read` / `admin:write`.
  - name: ai
    description: |
      AI surfaces — anomaly detection (3σ baseline), fix-path insights,
      and ignore-reason drafting. Routes are registered only when
      `ai_features.enabled` is true; otherwise endpoints 404 by absence.

paths:
  /auth/login:
    get:
      summary: Initiate OIDC login flow
      operationId: authLogin
      tags: [auth]
      description: |
        Redirects the user to the OIDC provider's authorization endpoint.
        Generates a state parameter (CSRF protection) and PKCE code verifier,
        stored in short-lived httpOnly cookies.
      responses:
        "302":
          description: Redirect to OIDC provider authorization endpoint

  /auth/callback:
    get:
      summary: OIDC callback after provider authorization
      operationId: authCallback
      tags: [auth]
      description: |
        Handles the OIDC provider's redirect back with an authorization code.
        Validates state, exchanges the code for tokens using PKCE, verifies
        the ID token, and sets a session cookie.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to UI root on success
        "400":
          description: Missing or invalid state/code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token exchange or verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: Clear session cookie
      operationId: authLogout
      tags: [auth]
      description: Clears the local session and cookie. When the OIDC provider advertises an end_session_endpoint, also returns a logout_url for RP-initiated logout.
      responses:
        "200":
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [logged_out]
                  logout_url:
                    type: string
                    description: |
                      RP-initiated logout URL (the OIDC `end_session_endpoint` with
                      `client_id`, `post_logout_redirect_uri`, and `id_token_hint`). Present
                      only when the provider advertises an `end_session_endpoint`; the SPA
                      navigates here to terminate the IdP SSO session. Absent → local logout only.

  /auth/refresh:
    post:
      summary: Refresh the session cookie
      operationId: authRefresh
      tags: [auth]
      description: |
        Re-verifies the session cookie and reissues it with a fresh expiry.
        Returns 401 if the session is missing or expired.
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [refreshed]
        "401":
          description: No session or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/userinfo:
    get:
      summary: Get authenticated user info
      operationId: authUserInfo
      tags: [auth]
      description: |
        Returns the current authenticated user's identity (subject, email, name).
        Requires a valid session cookie or Bearer token.
      responses:
        "200":
          description: Authenticated user information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/health:
    get:
      summary: Service health check
      operationId: getHealth
      tags: [health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/artifacts:
    get:
      summary: List cached artifacts
      operationId: listArtifacts
      tags: [artifacts]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
      responses:
        "200":
          description: Paginated list of artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactPage"

  /api/v1/artifacts/{id}:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Get artifact detail
      operationId: getArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact with current status and scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete artifact (cache + DB)
      description: |
        Permanently removes an artifact from cache and database, including all
        associated scan results and status records. This is the only resolution
        for SHA256 integrity violations — delete the artifact, next request
        re-fetches fresh from upstream.
      operationId: deleteArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  artifact:
                    type: string
                    example: "npm:lodash:4.17.21"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/scan-results:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Get scan history for an artifact
      operationId: getArtifactScanResults
      tags: [artifacts]
      responses:
        "200":
          description: List of scan results (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/rescan:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Trigger an async rescan of the artifact
      operationId: rescanArtifact
      tags: [artifacts]
      responses:
        "202":
          description: Rescan queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RescanResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/quarantine:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Manually quarantine an artifact
      operationId: quarantineArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact quarantined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUpdate"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/release:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Release a quarantined artifact back to CLEAN status and create a policy override
      description: |
        Releases the artifact and creates a policy override so it is not re-quarantined.
        The override scope is normally `version` (specific version only). If the artifact's
        stored `version` is the typosquat placeholder `*` — produced by the typosquat
        pre-scan across PyPI, npm, NuGet, Maven, RubyGems, gomod, and Docker — the override
        is created with scope `package`, covering all versions of the name. The placeholder
        applies uniformly to typosquat blocks regardless of whether the original request
        carried a version, because typosquat detection is name-based.

        Artifact IDs may need URL encoding when they contain special characters: `%2A` for
        the trailing `*` (typosquat synthetic rows), and `%2F` for slashes inside gomod
        module paths (e.g. `go:github.com%2Fspf13%2Fviper:%2A`). Maven typosquat IDs are
        4-segment (`maven:groupId:artifactId:%2A`) and round-trip through the Release
        endpoint without further encoding of the colons.
      operationId: releaseArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact released with policy override created (or reused if one already exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: CLEAN
                  artifact_id:
                    type: string
                    example: "pypi:requests:2.32.5"
                  override_id:
                    type: integer
                    example: 1
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Artifact was license-quarantined; release must be project-scoped.
            License decisions are project-scoped (project A may forbid a
            license while project B allows it), so a global release would have
            the wrong blast radius. Re-issue the release against
            `POST /api/v1/projects/{id}/overrides` for each project that needs
            the waiver. See [ADR-008](../adr/ADR-008-license-overrides-per-project.md).
          content:
            application/json:
              schema:
                type: object
                required: [error, next_action]
                properties:
                  error:
                    type: string
                    example: license_block_requires_project_scope
                  next_action:
                    type: object
                    required: [type, endpoint, method, hint]
                    properties:
                      type:
                        type: string
                        example: release_per_project
                      endpoint:
                        type: string
                        example: /api/v1/projects/{id}/overrides
                      method:
                        type: string
                        example: POST
                      hint:
                        type: string
                        example: open the project that pulled this artifact and release from there

  /api/v1/audit:
    get:
      summary: List audit log entries
      operationId: listAudit
      tags: [audit]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: event_type
          in: query
          required: false
          description: Filter by event type
          schema:
            type: string
            enum: [SERVED, BLOCKED, QUARANTINED, SCAN_UNAVAILABLE, RELEASED, SCANNED, OVERRIDE_CREATED, OVERRIDE_REVOKED, TAG_MUTATED, RESCAN_QUEUED, ALLOWED_WITH_WARNING, INTEGRITY_VIOLATION, ARTIFACT_DELETED]
      responses:
        "200":
          description: Paginated list of audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"

  /api/v1/overrides:
    get:
      summary: List policy overrides
      operationId: listOverrides
      tags: [overrides]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: active
          in: query
          required: false
          description: Filter by active status (revoked=false if true, revoked=true if false)
          schema:
            type: boolean
        - name: ecosystem
          in: query
          required: false
          description: Filter by ecosystem (exact match)
          schema:
            type: string
            enum: [docker, pypi, npm, nuget, maven, rubygems, go]
        - name: name
          in: query
          required: false
          description: Filter by package name (substring match, case-sensitive)
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of policy overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyOverridePage"
    post:
      summary: Create a new policy override
      operationId: createOverride
      tags: [overrides]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyOverrideRequest"
      responses:
        "201":
          description: Override created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOverrideResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/overrides/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Override ID
        schema:
          type: integer
          format: int64
    delete:
      summary: Revoke (soft-delete) a policy override
      operationId: revokeOverride
      tags: [overrides]
      responses:
        "200":
          description: Override revoked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverrideRevokeResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Override already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/artifacts/{id}/override:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Create policy override from artifact
      operationId: createArtifactOverride
      tags: [overrides]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtifactOverrideRequest"
      responses:
        "201":
          description: Override created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArtifactOverrideResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stats/summary:
    get:
      summary: Aggregated request and scan statistics
      operationId: getStatsSummary
      tags: [stats]
      responses:
        "200":
          description: Aggregated totals and daily buckets for the last 7 days
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /api/v1/stats/blocked:
    get:
      summary: List of blocked artifact events
      operationId: getStatsBlocked
      tags: [stats]
      responses:
        "200":
          description: Audit log entries with event_type=BLOCKED (newest first, max 500)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedEntry"

  /api/v1/feed:
    get:
      summary: List threat feed entries
      operationId: listFeed
      tags: [feed]
      responses:
        "200":
          description: Threat feed entries (newest first, max 1000)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreatFeedEntry"

  /api/v1/feed/refresh:
    post:
      summary: Trigger an async threat feed refresh
      operationId: refreshFeed
      tags: [feed]
      responses:
        "202":
          description: Refresh queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"

  /api/v1/docker/repositories:
    get:
      summary: List Docker repositories
      operationId: listDockerRepositories
      tags: [docker]
      parameters:
        - name: registry
          in: query
          required: false
          description: Filter by registry host (e.g. ghcr.io)
          schema:
            type: string
      responses:
        "200":
          description: List of Docker repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockerRepository"

  /api/v1/docker/repositories/{id}/tags:
    parameters:
      - $ref: "#/components/parameters/dockerRepoId"
    get:
      summary: List tags for a Docker repository
      operationId: listDockerTags
      tags: [docker]
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockerTag"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Create or move a tag on a Docker repository
      operationId: createDockerTag
      tags: [docker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDockerTagRequest"
      responses:
        "201":
          description: Tag created or moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDockerTagResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/docker/repositories/{id}/tags/{tag}:
    parameters:
      - $ref: "#/components/parameters/dockerRepoId"
      - name: tag
        in: path
        required: true
        description: Tag name
        schema:
          type: string
          example: "v1.0"
    delete:
      summary: Delete a tag from a Docker repository
      operationId: deleteDockerTag
      tags: [docker]
      responses:
        "204":
          description: Tag deleted (artifact is NOT removed)
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/docker/sync/{id}:
    parameters:
      - $ref: "#/components/parameters/dockerRepoId"
    post:
      summary: Trigger a manual sync for a Docker repository
      operationId: triggerDockerSync
      tags: [docker]
      responses:
        "202":
          description: Sync queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Sync service not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/docker/registries:
    get:
      summary: List allowed Docker registries from config
      operationId: listDockerRegistries
      tags: [docker]
      responses:
        "200":
          description: List of allowed registries (credentials are never exposed)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockerRegistry"

  /metrics:
    get:
      summary: Prometheus metrics endpoint
      operationId: getMetrics
      tags: [metrics]
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /api/v1/public-urls:
    get:
      summary: Get configured public URLs for ecosystem proxies
      operationId: getPublicURLs
      tags: [config]
      description: |
        Returns the public-facing URLs configured in the `public_urls` config section.
        The admin UI uses these to display correct proxy URLs on the Usage/Profile page.
        Empty strings indicate no public URL is configured for that ecosystem (the UI
        falls back to `<host>:port` format).
      responses:
        "200":
          description: Public URLs for each ecosystem
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicURLs"

  /api/v1/api-keys:
    post:
      summary: Create a new API key
      operationId: createAPIKey
      tags: [api-keys]
      description: |
        Creates a new per-user API key (PAT) for proxy authentication.
        The plaintext token is returned only once in the response.
        Requires the `keys:manage` scope (OIDC operator sessions have it).
        A key cannot be granted scopes the caller does not itself hold (403).
        Only available when both `auth.enabled` and `proxy_auth.enabled` are true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Human-readable label for the key
                  example: ci-pipeline
                scopes:
                  type: array
                  items: { $ref: "#/components/schemas/APIKeyScope" }
                  description: |
                    Optional list of scopes granted to this key. Empty list defaults
                    to `[proxy:fetch]` for backwards compatibility. Unknown scopes
                    return 400. Duplicates are deduplicated and reordered into the
                    canonical order (proxy:fetch, scan:upload, admin:read, admin:write,
                    keys:manage). A scope the caller does not hold returns 403.
                  example: ["proxy:fetch", "scan:upload"]
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreateResponse"
        "400":
          description: Invalid request (missing name, name too long, or invalid scope)
        "403":
          description: Missing keys:manage scope, or attempt to grant a scope the caller does not hold

    get:
      summary: List API keys owned by the authenticated user
      operationId: listAPIKeys
      tags: [api-keys]
      description: |
        Returns API keys owned by the authenticated user (enabled and disabled).
        The key hash and plaintext are never included in the response.
        Only available when both `auth.enabled` and `proxy_auth.enabled` are true.
        Returns 401 if authentication is missing or invalid.
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"

  /api/v1/api-keys/{id}:
    delete:
      summary: Revoke an API key
      operationId: revokeAPIKey
      tags: [api-keys]
      description: |
        Permanently disables an API key (sets enabled=false).
        Revocation is permanent — the key cannot be re-enabled.
        Only available when both `auth.enabled` and `proxy_auth.enabled` are true.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Key revoked
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Cannot revoke another user's key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Key not found

  /api/v1/admin/policy-mode:
    get:
      summary: Get current policy mode
      operationId: getPolicyMode
      tags: [admin]
      description: |
        Returns the current policy evaluation mode (strict, balanced, or permissive).
        See the Policy Tiers documentation for mode behavior details.
      responses:
        "200":
          description: Current policy mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyModeResponse"
    put:
      summary: Set policy mode
      operationId: setPolicyMode
      tags: [admin]
      description: |
        Changes the policy evaluation mode at runtime. The change takes effect
        immediately for all subsequent artifact evaluations. Existing quarantined
        artifacts are not re-evaluated automatically; use the rescan-quarantined
        endpoint to trigger re-evaluation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [strict, balanced, permissive]
                  description: The policy mode to set
      responses:
        "200":
          description: Policy mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyModeResponse"
        "400":
          description: Invalid mode value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/rescan-quarantined:
    post:
      summary: Rescan all quarantined artifacts
      operationId: rescanQuarantined
      tags: [admin]
      description: |
        Moves all QUARANTINED artifacts to PENDING_SCAN status and triggers
        rescans. Useful after policy mode changes or scanner updates. An audit
        log entry (RESCAN_QUEUED) is created for each artifact.
      responses:
        "200":
          description: Rescans queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RescanQuarantinedResponse"

  /api/v1/projects:
    get:
      summary: List projects
      operationId: listProjects
      tags: [projects]
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/Project" }
    post:
      summary: Create a project (explicit / strict-mode provisioning)
      operationId: createProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:        { type: string, pattern: "^[a-z0-9][a-z0-9_-]{0,63}$" }
                display_name: { type: string }
                description:  { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { description: Invalid label }
        "429": { description: Project hard-cap reached }

  /api/v1/projects/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Get a single project
      operationId: getProject
      tags: [projects]
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { description: Not found }
    patch:
      summary: Update project metadata
      operationId: updateProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                description:  { type: string }
                enabled:      { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
    delete:
      summary: Soft-disable a project (metadata only in v1.2)
      operationId: disableProject
      tags: [projects]
      responses:
        "204": { description: Disabled }

  /api/v1/projects/{id}/artifacts:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Project artifacts pane data — pulled, blocked, and overridden packages merged into one list
      operationId: listProjectArtifacts
      tags: [projects]
      description: |
        Returns the per-project view of every package that has crossed the
        project's policy boundary. Rows are deduped by `(ecosystem, name,
        version)` and sourced from three tables:

        - `artifact_project_usage` (pulled artifacts, `decision: CLEAN`)
        - `audit_log` rows where `event_type = 'LICENSE_BLOCKED'` and the
          project matches (`decision: BLOCKED_LICENSE`, with `blocked_license`
          and `last_blocked_at` populated)
        - `policy_overrides` rows scoped to this project (`decision:
          WHITELISTED` for `kind=allow`, `BLACKLISTED` for `kind=deny`)

        Override decision wins over CLEAN/BLOCKED_LICENSE when both apply.
      responses:
        "200":
          description: Project artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectArtifactRow" }

  /api/v1/projects/{id}/sbom:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Download a CycloneDX 1.5 SBOM of every artifact the project has pulled
      operationId: getProjectSBOM
      tags: [projects, sbom]
      description: |
        Returns a freshly generated CycloneDX 1.5 JSON SBOM aggregating every
        artifact this project has pulled through the proxy. The SBOM is
        rebuilt on every request — there is no cache, because the set of
        artifacts the project has used changes with every pull.

        Source tables joined to build the components list:

        - `artifact_project_usage` — the (artifact_id, project_id) link
        - `artifacts`              — name, version, sha256, upstream_url
        - `sbom_metadata`          — extracted SPDX licenses (when present)
        - `artifact_status`        — quarantine status surfaced as a property

        Per-component fields populated:

        | CycloneDX field       | Source                                              |
        |-----------------------|-----------------------------------------------------|
        | `type`                | `container` for docker, `library` otherwise         |
        | `name`, `version`     | `artifacts.name`, `artifacts.version`               |
        | `purl`                | derived from ecosystem (see PURL mapping below)     |
        | `hashes[SHA-256]`     | `artifacts.sha256`                                  |
        | `licenses[]`          | `sbom_metadata.licenses_json` (SPDX IDs/expressions)|
        | `externalReferences`  | `artifacts.upstream_url` (type=distribution)        |
        | `properties[]`        | `shieldoo:status`, `shieldoo:size_bytes`, `shieldoo:cached_at`, `shieldoo:released_at` (only when admin-released after a quarantine) |

        **PURL mapping per ecosystem:**

        - pypi   → `pkg:pypi/<name>@<version>`
        - npm    → `pkg:npm/<name>@<version>` (or `.../%40scope/name@...` for scoped)
        - maven  → `pkg:maven/<groupId>/<artifactId>@<version>`
        - nuget  → `pkg:nuget/<name>@<version>`
        - rubygems → `pkg:gem/<name>@<version>`
        - go     → `pkg:golang/<namespace>/<name>@<version>`
        - docker → `pkg:oci/<lastpath>@sha256:<digest>?repository_url=<host/path>&tag=<tag>`

        The `dependencies` field is intentionally omitted — the proxy only
        observes pull events, never resolved dependency trees, so any graph
        it invented would be misleading. Rate-limited by the `sbom-download`
        bucket (per-token).
      responses:
        "200":
          description: CycloneDX 1.5 JSON document
          headers:
            Content-Disposition:
              schema: { type: string }
              description: |
                `attachment; filename="sbom-<label>-YYYYMMDD.cdx.json"` so
                browsers suggest a meaningful name in the Save As dialog.
          content:
            application/vnd.cyclonedx+json; version=1.5:
              schema:
                type: object
                description: CycloneDX 1.5 JSON document — see https://cyclonedx.org/docs/1.5/json/
        "400":
          description: Invalid project id (non-numeric path segment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
        "429":
          description: Rate limit exceeded (per-token `sbom-download` bucket — 30/min, burst 5)
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds to wait before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: SBOM disabled in config (`sbom.enabled: false`)

  /api/v1/projects/{id}/license-policy:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Effective license policy for a project
      operationId: getProjectLicensePolicy
      tags: [projects, license]
      responses:
        "200":
          description: License policy view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LicensePolicyView" }
    put:
      summary: Upsert per-project license policy override
      operationId: putProjectLicensePolicy
      tags: [projects, license]
      description: |
        Upsert the per-project license policy override row. Applies in both
        lazy and strict projects modes — see ADR-004 for the threat-model
        rationale.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LicensePolicyUpdate" }
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LicensePolicyView" }
    delete:
      summary: Remove per-project override (fall back to inherit)
      operationId: deleteProjectLicensePolicy
      tags: [projects, license]
      description: |
        Deletes the `project_license_policy` row for this project; the
        project then inherits the global policy. The resolver's cached
        per-project entry is evicted so subsequent requests pick up the
        reverted effective policy immediately. Safe to call when no row
        exists (no-op).
      responses:
        "200":
          description: Effective policy after delete (mode=inherit)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LicensePolicyView" }

  /api/v1/projects/{id}/overrides:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
    get:
      summary: List per-project policy overrides (active + revoked)
      operationId: listProjectOverrides
      tags: [projects, overrides]
      description: |
        Returns every `policy_overrides` row scoped to this project, ordered by
        `created_at DESC, id DESC`. Both active and revoked rows are included so
        the audit-trail panel on Project Detail can render history.

        Backs the **Project license overrides** panel on Project Detail (see
        [ADR-008](../adr/ADR-008-license-overrides-per-project.md)).
      responses:
        "200":
          description: Active + revoked per-project overrides
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectOverride" }
        "404": { description: Project not found }
    post:
      summary: Create a per-project policy override (whitelist or blacklist)
      operationId: createProjectOverride
      tags: [projects, overrides]
      description: |
        Writes a `policy_overrides` row scoped to this project.

        - `kind=allow` lets the package through despite a license/scan block (whitelist).
        - `kind=deny` blocks the package even when policy would allow it (blacklist).
        - `scope=package` covers every version; `scope=version` requires `version` and matches it exactly.

        Per-project DENY beats per-project ALLOW which beats global ALLOW.
        Returns 409 when an active override of the same `(ecosystem, name, version, scope, kind)` already exists for this project.

        This is the **canonical endpoint for license-block releases** since
        migration 036 (ADR-008). The global `POST /api/v1/artifacts/{id}/release`
        returns 409 + `next_action` when called against a license-quarantined
        artifact and points the caller here.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectOverrideRequest" }
      responses:
        "201":
          description: Override created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectOverride" }
        "400": { description: Invalid request body }
        "404": { description: Project not found }
        "409": { description: Duplicate active override }

  /api/v1/projects/{id}/overrides/{overrideId}/revoke:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer, format: int64 } }
      - { in: path, name: overrideId, required: true, schema: { type: integer, format: int64 } }
    post:
      summary: Revoke a per-project policy override
      operationId: revokeProjectOverride
      tags: [projects, overrides]
      description: |
        Soft-deletes the override (`revoked = TRUE`, `revoked_at = now()`).
        Idempotent — revoking an already-revoked row returns 200 with
        `already_revoked: true`. Returns 404 if the override does not
        belong to this project.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, description: Free-form revoke reason for the audit log }
      responses:
        "200":
          description: Override revoked (or already revoked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  revoked: { type: boolean }
                  already_revoked: { type: boolean }
        "404": { description: Override not found in this project }

  /api/v1/policy/licenses:
    get:
      summary: Effective global license policy (runtime-mutable)
      operationId: getGlobalLicensePolicy
      tags: [license, policy]
      description: |
        Returns the policy currently in effect. `source=db` means a runtime
        edit persisted in `global_license_policy` is active; `source=config`
        means the YAML values from `policy.licenses.*` are the fallback.
      responses:
        "200":
          description: Global license policy view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalLicensePolicyView" }
    put:
      summary: Upsert the global license policy (applied live, no restart)
      operationId: putGlobalLicensePolicy
      tags: [license, policy]
      description: |
        Persists to the `global_license_policy` singleton row (id=1) and
        pushes the new values into the live resolver + policy engine. The
        per-project license cache is purged so projects inheriting the
        global policy see the new values immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GlobalLicensePolicyUpdate" }
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalLicensePolicyView" }
        "400": { description: Validation error (bad enum value) }
    delete:
      summary: Revert to the YAML fallback
      operationId: deleteGlobalLicensePolicy
      tags: [license, policy]
      description: |
        Deletes the `global_license_policy` row and swaps the live resolver
        back to the YAML values captured at startup (`policy.licenses.*`
        from `docker/config.yaml`). Purges the per-project policy cache so
        inheritors pick up the reverted values immediately. The subsequent
        GET returns `source: "config"`.
      responses:
        "200":
          description: Policy after revert (source=config)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalLicensePolicyView" }

  /api/v1/artifacts/{id}/sbom:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Download the CycloneDX SBOM blob for an artifact
      operationId: getArtifactSBOM
      tags: [artifacts, sbom]
      responses:
        "200":
          description: CycloneDX JSON
          content:
            application/vnd.cyclonedx+json:
              schema:
                type: object
        "404": { description: No SBOM exists for this artifact }
        "501": { description: SBOM feature disabled }

  /api/v1/artifacts/{id}/licenses:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Pre-extracted SPDX IDs for an artifact's SBOM
      operationId: getArtifactLicenses
      tags: [artifacts, license]
      responses:
        "200":
          description: License list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id:     { type: string }
                  licenses:        { type: array, items: { type: string } }
                  component_count: { type: integer }
                  generator:       { type: string }
                  generated_at:    { type: string, format: date-time }

  # ---- Vulnerability scan: push-from-CI SBOM ingestion -----------------
  /api/v1/projects/{label}/components/{name}/scans:
    post:
      summary: Upload a CycloneDX SBOM for a project component (CI ingestion)
      operationId: uploadComponentSBOM
      tags: [vuln-scan]
      description: |
        Authenticated with `Authorization: Bearer <PAT>` carrying the
        `scan:upload` scope (`/auth/login` is *not* used by CI). The body is a
        CycloneDX 1.5+ JSON SBOM (max ~50 MB). Component is auto-created on
        first upload, capped at `vuln_scan.max_components_per_project`.

        Returns the queued `scan_run` row; the actual scan runs asynchronously
        and findings appear once `status` transitions to `done`.
      parameters:
        - name: label
          in: path
          required: true
          schema: { type: string }
          description: Project label (per ADR-001)
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9][a-z0-9._/-]{0,255}$"
        - name: trigger
          in: query
          schema: { type: string, enum: [upload, manual, rescan], default: upload }
      requestBody:
        required: true
        content:
          application/vnd.cyclonedx+json:
            schema:
              type: string
              format: binary
              description: CycloneDX 1.5+ JSON document
      responses:
        "202":
          description: Accepted — scan queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanRun" }
        "400": { description: SBOM body fails structural validation (depth/component/string limits) }
        "401": { description: Missing or invalid Bearer PAT }
        "403": { description: PAT does not carry the scan:upload scope }
        "413": { description: SBOM body exceeds vuln_scan.max_sbom_bytes }
        "415": { description: Unsupported Content-Type (must be application/vnd.cyclonedx+json) }
        "422": { description: Per-project component cap reached }
        "429": { description: Rate-limited by vuln_scan.rate_limit.uploads_per_hour }

  # ---- Vulnerability scan: admin reads (AdminAuthChain) ----------------
  /api/v1/vulnerabilities/components:
    get:
      summary: List components with denormalized severity counts (Screen 1)
      operationId: listVulnerabilityComponents
      tags: [vuln-scan]
      parameters:
        - name: project
          in: query
          description: >
            Exact project-label filter. The value is normalized (lowercased and
            trimmed) before matching, mirroring how labels are stored, so the
            filter is case-insensitive and whitespace-insensitive.
          schema: { type: string }
        - name: ecosystem
          in: query
          schema: { type: string }
        - name: severity_floor
          in: query
          schema: { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        - name: has_new
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          schema: { type: string, description: "Substring filter on name/display_name" }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: cursor
          in: query
          description: >
            Opaque keyset cursor returned by a prior call's `next_cursor` field.
            When provided, the page is filtered with `id < cursor` and ordered
            by id DESC for stable, O(LIMIT) pagination. Mutually exclusive with
            offset; cursor wins when both are supplied.
          schema: { type: string }
      responses:
        "200":
          description: Component list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ComponentRow" }
                  next_cursor:
                    type: string
                    description: >
                      Present when more rows likely exist. Pass back as
                      `cursor` to fetch the next page. Absence indicates
                      end-of-stream.
        "503":
          description: Vulnerability scanning is not enabled in this deployment

  /api/v1/vulnerabilities/components/{id}:
    get:
      summary: Get component metadata
      operationId: getVulnerabilityComponent
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: Component
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Component" }
        "404": { description: Component not found }

    patch:
      summary: Update component metadata (display_name, description, repo_url, ai_enabled, enabled)
      operationId: updateVulnerabilityComponent
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                description:  { type: string }
                repo_url:     { type: string }
                enabled:      { type: boolean }
                ai_enabled:   { type: boolean }
      responses:
        "204": { description: Updated }
        "400": { description: Invalid request body }
        "404": { description: Component not found }

  /api/v1/vulnerabilities/components/{id}/scans:
    get:
      summary: List recent scan runs for a component
      operationId: listVulnerabilityScans
      tags: [vuln-scan]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: limit, in: query, schema: { type: integer, default: 100 } }
        - name: cursor
          in: query
          description: >
            Keyset cursor (id of the last row from the previous page). When
            provided, returns rows with `id < cursor` ordered DESC. Page until
            the response omits `next_cursor`.
          schema: { type: string }
      responses:
        "200":
          description: Scan run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ScanRun" }
                  next_cursor:
                    type: string
                    description: Present when the page filled to `limit`; pass back as `cursor` to continue.

  /api/v1/vulnerabilities/components/{id}/rescan:
    post:
      summary: Trigger an immediate rescan against the most recent SBOM
      operationId: triggerComponentRescan
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "202":
          description: Rescan queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan_run_id: { type: integer, format: int64 }
        "404": { description: Component not found or has no SBOMs to rescan }
        "429": { description: Rate-limited }

  /api/v1/vulnerabilities/components/{id}/ignores:
    get:
      summary: List CVE ignore records for a component (active + revoked + expired)
      operationId: listComponentIgnores
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: Ignore list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Ignore" }

    post:
      summary: Create a CVE ignore for a (cve_id, package_name) pair
      operationId: createComponentIgnore
      tags: [vuln-scan]
      description: |
        Suppression is per-package (version is informational only). Cap of
        100 active ignores per component. Writes `ignore_created` audit row
        and (when ai_draft_accepted=true) `ai_draft_accepted` audit row.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreCreateRequest" }
      responses:
        "201":
          description: Ignore created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ignore" }
        "400": { description: Invalid request body }
        "409": { description: Per-component ignore cap (100) reached }

  /api/v1/vulnerabilities/components/{id}/ignores/{ignoreId}:
    delete:
      summary: Revoke a CVE ignore (sets revoked_at)
      operationId: revokeComponentIgnore
      tags: [vuln-scan]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: ignoreId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: Revoked }
        "404": { description: Ignore not found }

  /api/v1/vulnerabilities/scan-runs/{id}:
    get:
      summary: Get scan run metadata
      operationId: getScanRun
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: Scan run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanRun" }
        "404": { description: Run not found }

  /api/v1/vulnerabilities/scan-runs/{id}/findings:
    get:
      summary: List findings for a scan run
      operationId: getScanRunFindings
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: Findings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ScanFinding" }

  /api/v1/vulnerabilities/scan-runs/{id}/sbom:
    get:
      summary: Stream the original CycloneDX SBOM (verifies SHA-256 on read)
      operationId: getScanRunSBOM
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: CycloneDX SBOM body
          content:
            application/vnd.cyclonedx+json:
              schema: { type: string, format: binary }
        "502":
          description: SBOM blob fetch failed or SHA-256 mismatch (integrity violation)

  /api/v1/vulnerabilities/summary:
    get:
      summary: Aggregate severity counts across all components
      operationId: getVulnerabilitySummary
      tags: [vuln-scan]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VulnSummary" }

  /api/v1/vulnerabilities/badge:
    get:
      summary: New-CRITICAL badge counter for the sidebar (polled every 30s)
      operationId: getVulnerabilityBadge
      tags: [vuln-scan]
      responses:
        "200":
          description: Badge counter
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /api/v1/projects/{id}/components:
    get:
      summary: List components owned by a project
      operationId: listProjectComponents
      tags: [vuln-scan]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: Component list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Component" }

  # ---- AI surfaces (registered only when ai_features.enabled = true) -----
  /api/v1/ai/anomalies:
    get:
      summary: List recent unacknowledged anomalies
      operationId: listAnomalies
      tags: [ai]
      responses:
        "200":
          description: Anomaly list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Anomaly" } }

  /api/v1/ai/anomalies/{id}/acknowledge:
    post:
      summary: Acknowledge an anomaly for the current user
      operationId: acknowledgeAnomaly
      tags: [ai]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "204": { description: Acknowledged }

  /api/v1/ai/components/{id}/fix-path:
    get:
      summary: Pure-SQL fix-path insight (no LLM)
      operationId: getFixPathInsight
      tags: [ai]
      description: |
        Returns the smallest single upgrade that resolves the most CRITICAL+HIGH
        findings on a component. Computed deterministically from scan_findings
        + fixed_version columns; no scanner-bridge call.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        "200":
          description: Fix-path insight or null when no recommendation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FixPathInsight" }

  /api/v1/ai/draft-ignore-reason:
    post:
      summary: Draft an ignore-reason via the scanner-bridge gRPC sidecar
      operationId: draftIgnoreReason
      tags: [ai]
      description: |
        Always returns 503 when `ai_features.ignore_reason_drafter.enabled` is
        false (Go-side stub). When enabled, calls the Python `vuln_drafter`
        RPC (currently a placeholder).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [component_id, cve_id, package_name, package_version]
              properties:
                component_id:    { type: integer, format: int64 }
                cve_id:          { type: string, example: "CVE-2024-12345" }
                package_name:    { type: string }
                package_version: { type: string }
      responses:
        "200":
          description: Draft reason
          content:
            application/json:
              schema:
                type: object
                properties:
                  reason: { type: string }
        "503": { description: Drafter disabled or sidecar unreachable }

components:
  securitySchemes:
    BearerPAT:
      type: http
      scheme: bearer
      description: |
        Personal access token. Scopes come from the key's `scopes` column.
        Admin API requires `admin:read`/`admin:write` (method-derived);
        scan-upload requires `scan:upload`. The global super-token (scope `*`)
        is also accepted here.
    CookieSession:
      type: apiKey
      in: cookie
      name: shieldoo_session
      description: |
        OIDC session cookie. The admin auth chain injects the operator scope set
        (`admin:read,admin:write,keys:manage,proxy:fetch,scan:upload`) — operators
        are the interactive trust root and may mint an API key of any scope.
        Scopes are injected by the auth chain, not read from the JWT.
    BasicPAT:
      type: http
      scheme: basic
      description: |
        Proxy authentication. Username = project label, password = PAT or global
        token. Requires the `proxy:fetch` scope.
  parameters:
    artifactId:
      name: id
      in: path
      required: true
      description: Artifact identifier in the form `ecosystem:name:version`
      schema:
        type: string
        example: "pypi:requests:2.31.0"
    dockerRepoId:
      name: id
      in: path
      required: true
      description: Docker repository ID
      schema:
        type: integer
        format: int64
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    per_page:
      name: per_page
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    APIKey:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        owner_email:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        scopes:
          type: string
          description: |
            Comma-separated capability tokens granted to this key. Empty string is
            treated as legacy `proxy:fetch` only (rows created before migration 032).
          example: "proxy:fetch,scan:upload"

    APIKeyScope:
      type: string
      enum:
        - proxy:fetch
        - scan:upload
        - admin:read
        - admin:write
        - keys:manage
      description: |
        Canonical capability tokens used by `RequireScope` middleware.
        - `proxy:fetch` — required for Basic-auth proxy traffic (pip/npm/docker/etc).
        - `scan:upload` — POST CycloneDX SBOMs to `/api/v1/projects/{label}/components/{name}/scans`.
        - `admin:read` — read-only admin API (artifacts, vulnerabilities, audit log).
        - `admin:write` — write admin API (overrides, ignores, deletes, rescan).
        - `keys:manage` — create/list/revoke API keys (`/api/v1/api-keys`).

    APIKeyCreateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        owner_email:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        scopes:
          type: array
          items: { $ref: "#/components/schemas/APIKeyScope" }
          description: Canonical-ordered list of scopes granted to this key.
        token:
          type: string
          description: Plaintext API key — shown only once, never again

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        scanners:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScannerHealth"

    ScannerHealth:
      type: object
      required: [healthy]
      properties:
        healthy:
          type: boolean
        error:
          type: string

    Artifact:
      type: object
      required: [ecosystem, name, version, upstream_url, sha256, size_bytes, cached_at, last_accessed_at, storage_path]
      properties:
        ecosystem:
          type: string
          example: pypi
        name:
          type: string
          example: requests
        version:
          type: string
          example: 2.31.0
        upstream_url:
          type: string
          format: uri
        sha256:
          type: string
        size_bytes:
          type: integer
          format: int64
        cached_at:
          type: string
          format: date-time
        last_accessed_at:
          type: string
          format: date-time
        storage_path:
          type: string
        image_size_bytes:
          type: integer
          format: int64
          nullable: true
          description: |
            Docker only: parsed from the manifest as `config.size + sum(layers[].size)`.
            NULL for index manifests (multi-arch lists), for manifests we couldn't parse,
            and for any input where the sum would overflow `int64`. Other ecosystems omit
            this field. Distinct from `size_bytes`, which for Docker is the manifest JSON
            byte count.
        is_index:
          type: boolean
          nullable: true
          description: |
            Docker only: TRUE for manifest list / OCI image index manifests (no `layers[]`).
            Per-arch sizes live in the referenced manifests, which clients pull as separate
            digests.
        is_attestation:
          type: boolean
          nullable: true
          description: |
            Docker only: TRUE for BuildKit attestation manifests (in-toto config or
            `vnd.docker.reference.type=attestation-manifest` annotation). UI renders these
            with a distinct badge so they aren't confused with real images.
        media_type:
          type: string
          description: |
            Docker only: manifest media type (e.g. `application/vnd.oci.image.manifest.v1+json`).
        layer_count:
          type: integer
          nullable: true
          description: Docker only; `len(layers)`. NULL for index manifests.

    ArtifactStatusObject:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [CLEAN, SUSPICIOUS, QUARANTINED, PENDING_SCAN]
        quarantine_reason:
          type: string
        quarantined_at:
          type: string
          format: date-time
          nullable: true
        released_at:
          type: string
          format: date-time
          nullable: true

    ArtifactWithStatus:
      allOf:
        - $ref: "#/components/schemas/Artifact"
        - type: object
          required: [id, status]
          properties:
            id:
              type: string
              description: Composite artifact ID (ecosystem:name:version)
              example: "pypi:requests:2.31.0"
            status:
              $ref: "#/components/schemas/ArtifactStatusObject"

    ArtifactDetail:
      description: Artifact detail response (returned by GET /api/v1/artifacts/{id})
      allOf:
        - $ref: "#/components/schemas/ArtifactWithStatus"
        - type: object
          properties:
            scan_results:
              type: array
              items:
                $ref: "#/components/schemas/ScanResult"

    ArtifactPage:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactWithStatus"
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ScanResult:
      type: object
      required: [id, artifact_id, scanned_at, scanner_name, scanner_version, verdict, confidence, findings_json, duration_ms]
      properties:
        id:
          type: integer
          format: int64
        artifact_id:
          type: string
        scanned_at:
          type: string
          format: date-time
        scanner_name:
          type: string
        scanner_version:
          type: string
        verdict:
          type: string
          enum: [CLEAN, SUSPICIOUS, MALICIOUS]
        confidence:
          type: number
          format: float
        findings_json:
          type: string
          description: JSON-encoded array of findings
        duration_ms:
          type: integer
          format: int64

    ArtifactStats:
      type: object
      required: [total, clean, suspicious, quarantined, pending_scan]
      properties:
        total:
          type: integer
          format: int64
          description: Total number of cached artifacts
        clean:
          type: integer
          format: int64
          description: Artifacts with CLEAN status
        suspicious:
          type: integer
          format: int64
          description: Artifacts with SUSPICIOUS status
        quarantined:
          type: integer
          format: int64
          description: Artifacts with QUARANTINED status
        pending_scan:
          type: integer
          format: int64
          description: Artifacts with PENDING_SCAN status

    RequestStats:
      type: object
      required: [served_24h, blocked_24h, served_all, blocked_all]
      properties:
        served_24h:
          type: integer
          format: int64
          description: Number of SERVED requests in the last 24 hours
        blocked_24h:
          type: integer
          format: int64
          description: Number of BLOCKED requests in the last 24 hours
        served_all:
          type: integer
          format: int64
          description: Total number of SERVED requests (all time)
        blocked_all:
          type: integer
          format: int64
          description: Total number of BLOCKED requests (all time)

    StatsSummary:
      type: object
      required: [artifacts, requests, by_period]
      properties:
        artifacts:
          $ref: "#/components/schemas/ArtifactStats"
        requests:
          $ref: "#/components/schemas/RequestStats"
        by_period:
          type: object
          description: Daily request count buckets for the last 7 days keyed by date (YYYY-MM-DD)
          additionalProperties:
            type: object
            properties:
              served:
                type: integer
                format: int64
              blocked:
                type: integer
                format: int64
              quarantined:
                type: integer
                format: int64

    BlockedEntry:
      type: object
      required: [id, ts]
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        artifact_id:
          type: string
        client_ip:
          type: string
        reason:
          type: string

    ThreatFeedEntry:
      type: object
      required: [sha256, ecosystem, package_name, reported_at]
      properties:
        sha256:
          type: string
        ecosystem:
          type: string
        package_name:
          type: string
        version:
          type: string
        reported_at:
          type: string
          format: date-time
        source_url:
          type: string
          format: uri
        iocs_json:
          type: string
          description: JSON-encoded array of indicators of compromise

    AcceptedResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [accepted]
        message:
          type: string

    StatusUpdate:
      type: object
      required: [status, artifact_id]
      properties:
        status:
          type: string
          enum: [CLEAN, QUARANTINED]
        artifact_id:
          type: string

    AuditEntry:
      type: object
      required: [id, ts, event_type]
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        event_type:
          type: string
          enum: [SERVED, BLOCKED, QUARANTINED, SCAN_UNAVAILABLE, RELEASED, SCANNED, OVERRIDE_CREATED, OVERRIDE_REVOKED, TAG_MUTATED, RESCAN_QUEUED, ALLOWED_WITH_WARNING]
        artifact_id:
          type: string
        client_ip:
          type: string
        user_agent:
          type: string
        reason:
          type: string
        metadata_json:
          type: string
          description: JSON-encoded additional metadata
        user_email:
          type: string
          description: Email of the user who performed the action

    AuditPage:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    PolicyOverride:
      type: object
      required: [id, ecosystem, name, scope, created_by, created_at, revoked]
      properties:
        id:
          type: integer
          format: int64
        ecosystem:
          type: string
          description: Package ecosystem
          example: pypi
        name:
          type: string
          description: Package name
          example: requests
        version:
          type: string
          description: Package version (null for package-scope overrides)
          example: 2.32.3
          nullable: true
        scope:
          type: string
          description: Override scope
          enum: [version, package]
          example: version
        reason:
          type: string
          description: Reason for override
          example: "False positive: safe package"
        created_by:
          type: string
          description: User ID or API key that created the override
          example: admin
        created_at:
          type: string
          format: date-time
          example: "2026-03-25T10:30:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration timestamp
          example: "2026-06-25T10:30:00Z"
        revoked:
          type: boolean
          description: Whether this override has been revoked
          example: false
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when override was revoked
          example: null

    ProjectArtifactRow:
      type: object
      required: [ecosystem, name, decision]
      description: |
        One row of `GET /api/v1/projects/{id}/artifacts`. May represent a
        pulled artifact, a license-block event, an active override, or any
        combination — see the operation description.
      properties:
        id:             { type: string, description: "Real artifact id, omitted for standalone overrides on never-pulled packages" }
        ecosystem:      { type: string, example: npm }
        name:           { type: string, example: lodash }
        version:        { type: string, description: "Empty when the row only carries a package-scope override or a name-only block" }
        decision:
          type: string
          enum: [CLEAN, BLOCKED_LICENSE, WHITELISTED, BLACKLISTED]
          description: |
            Override > license-block > pulled. WHITELISTED and BLACKLISTED
            indicate an active per-project override is in effect.
        first_used_at:  { type: string, format: date-time }
        last_used_at:   { type: string, format: date-time }
        use_count:      { type: integer }
        licenses:       { type: array, items: { type: string }, description: "SPDX expressions extracted from SBOM" }
        blocked_license: { type: string, description: "SPDX expression that triggered the most recent license block" }
        last_blocked_at: { type: string, format: date-time }
        block_count:     { type: integer }
        override_id:     { type: integer, format: int64 }
        override_kind:   { type: string, enum: [allow, deny] }
        override_scope:  { type: string, enum: [package, version] }
        override_reason: { type: string }
        override_expires_at: { type: string, format: date-time }

    ProjectOverrideRequest:
      type: object
      required: [ecosystem, name, scope, kind, reason]
      properties:
        ecosystem: { type: string, example: npm }
        name:      { type: string, example: lodash }
        version:   { type: string, description: "Required when scope=version, ignored when scope=package", example: "4.17.21" }
        scope:     { type: string, enum: [package, version] }
        kind:      { type: string, enum: [allow, deny], description: "allow = whitelist, deny = blacklist" }
        reason:    { type: string, description: "Mandatory — written to the audit log for traceability" }
        expires_at: { type: string, format: date-time, description: "Optional. After this point the override stops applying (the row stays for audit)" }

    ProjectOverride:
      type: object
      required: [id, project_id, ecosystem, name, scope, kind, reason, created_by, created_at, revoked]
      properties:
        id:         { type: integer, format: int64 }
        project_id: { type: integer, format: int64 }
        ecosystem:  { type: string }
        name:       { type: string }
        version:    { type: string }
        scope:      { type: string, enum: [package, version] }
        kind:       { type: string, enum: [allow, deny] }
        reason:     { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked:    { type: boolean }
        revoked_at: { type: string, format: date-time, nullable: true }

    PolicyOverridePage:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PolicyOverride"
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    CreatePolicyOverrideRequest:
      type: object
      required: [ecosystem, name, scope]
      properties:
        ecosystem:
          type: string
          description: Package ecosystem
          example: pypi
        name:
          type: string
          description: Package name
          example: requests
        version:
          type: string
          description: Package version (required if scope is version)
          example: 2.32.3
        scope:
          type: string
          description: Override scope
          enum: [version, package]
          example: version
        reason:
          type: string
          description: Reason for override
          example: "False positive: safe package"

    CreateArtifactOverrideRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for override
          example: "False positive: safe package"
        scope:
          type: string
          description: "Override scope (default: version)"
          enum: [version, package]
          example: version

    OverrideRevokeResponse:
      type: object
      required: [status, id]
      properties:
        status:
          type: string
          enum: [revoked]
          example: revoked
        id:
          type: string
          description: Override ID (string representation)
          example: "42"

    DockerRepository:
      type: object
      required: [id, registry, name, is_internal, created_at, sync_enabled]
      properties:
        id:
          type: integer
          format: int64
        registry:
          type: string
          example: docker.io
        name:
          type: string
          example: library/nginx
        is_internal:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        sync_enabled:
          type: boolean

    DockerTag:
      type: object
      required: [id, repo_id, tag, manifest_digest, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        repo_id:
          type: integer
          format: int64
        tag:
          type: string
          example: "v1.0"
        manifest_digest:
          type: string
          example: "sha256:abc123..."
        artifact_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDockerTagRequest:
      type: object
      required: [tag, manifest_digest]
      properties:
        tag:
          type: string
          example: "v1.0"
        manifest_digest:
          type: string
          example: "sha256:abc123..."

    CreateDockerTagResponse:
      type: object
      required: [tag, manifest_digest, tag_moved]
      properties:
        tag:
          type: string
        manifest_digest:
          type: string
        tag_moved:
          type: boolean
          description: True if an existing tag was moved to a new digest
        rescan_triggered:
          type: boolean
          description: True if a re-scan was triggered due to tag movement

    DockerRegistry:
      type: object
      required: [host, url]
      properties:
        host:
          type: string
          example: docker.io
        url:
          type: string
          format: uri
          example: https://registry-1.docker.io

    RescanResponse:
      type: object
      required: [status, artifact_id, message]
      properties:
        status:
          type: string
          enum: [PENDING_SCAN]
        artifact_id:
          type: string
        message:
          type: string

    CreateOverrideResponse:
      type: object
      required: [id, ecosystem, name, scope, reason]
      description: Response from POST /api/v1/overrides (subset of PolicyOverride fields)
      properties:
        id:
          type: integer
          format: int64
        ecosystem:
          type: string
          example: pypi
        name:
          type: string
          example: requests
        version:
          type: string
          example: 2.32.3
        scope:
          type: string
          enum: [version, package]
        reason:
          type: string

    CreateArtifactOverrideResponse:
      type: object
      required: [id, artifact_id, scope, reason]
      description: Response from POST /api/v1/artifacts/{id}/override
      properties:
        id:
          type: integer
          format: int64
        artifact_id:
          type: string
          example: "pypi:requests:2.32.3"
        scope:
          type: string
          enum: [version, package]
        reason:
          type: string

    UserInfo:
      type: object
      required: [sub, email, name]
      properties:
        sub:
          type: string
          description: OIDC subject identifier
        email:
          type: string
          format: email
        name:
          type: string

    PublicURLs:
      type: object
      description: Public-facing URLs for each ecosystem proxy
      properties:
        pypi:
          type: string
          example: "https://pypi.gate.example.com"
        npm:
          type: string
          example: "https://npm.gate.example.com"
        nuget:
          type: string
          example: "https://nuget.gate.example.com"
        docker:
          type: string
          example: "https://cr.gate.example.com"
        maven:
          type: string
          example: "https://maven.gate.example.com"
        rubygems:
          type: string
          example: "https://gems.gate.example.com"
        gomod:
          type: string
          example: "https://go.gate.example.com"

    PolicyModeResponse:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [strict, balanced, permissive]
          description: Current policy evaluation mode

    RescanQuarantinedResponse:
      type: object
      required: [queued, message]
      properties:
        queued:
          type: integer
          description: Number of artifacts queued for rescan
          example: 12
        message:
          type: string
          example: "Quarantined artifacts queued for rescan"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Project:
      type: object
      required: [id, label, created_at, created_via, enabled]
      properties:
        id:          { type: integer, format: int64 }
        label:       { type: string, pattern: "^[a-z0-9][a-z0-9_-]{0,63}$" }
        display_name: { type: string }
        description: { type: string }
        created_at:  { type: string, format: date-time }
        created_via: { type: string, enum: [lazy, api, seed] }
        enabled:     { type: boolean }

    LicensePolicyView:
      type: object
      properties:
        project_id:       { type: integer, format: int64 }
        mode:             { type: string, enum: [inherit, override, disabled] }
        blocked:          { type: array, items: { type: string } }
        warned:           { type: array, items: { type: string } }
        allowed:          { type: array, items: { type: string } }
        unknown_action:   { type: string, enum: [allow, warn, block] }
        updated_at:       { type: string }
        updated_by:       { type: string }
        effective_source: { type: string, description: "Human-readable source of the effective policy" }

    LicensePolicyUpdate:
      type: object
      required: [mode]
      properties:
        mode:           { type: string, enum: [inherit, override, disabled] }
        blocked:        { type: array, items: { type: string } }
        warned:         { type: array, items: { type: string } }
        allowed:        { type: array, items: { type: string } }
        unknown_action: { type: string, enum: [allow, warn, block, ""] }

    GlobalLicensePolicyView:
      type: object
      properties:
        enabled:        { type: boolean, description: "Mirror of the YAML master switch — policy.licenses.enabled (file-controlled)" }
        blocked:        { type: array, items: { type: string } }
        warned:         { type: array, items: { type: string } }
        allowed:        { type: array, items: { type: string } }
        unknown_action: { type: string, enum: [allow, warn, block] }
        on_sbom_error:  { type: string, enum: [allow, warn, block] }
        or_semantics:   { type: string, enum: [any_allowed, all_allowed] }
        updated_at:     { type: string, description: "Present only when source=db" }
        updated_by:     { type: string, description: "Admin email from OIDC session (when auth is enabled)" }
        source:         { type: string, enum: [db, config], description: "Where the live values came from" }

    GlobalLicensePolicyUpdate:
      type: object
      required: [blocked, warned, allowed, unknown_action, on_sbom_error]
      properties:
        enabled:        { type: boolean, description: "Optional — toggles the DB-persisted row; YAML master switch still wins if false" }
        blocked:        { type: array, items: { type: string } }
        warned:         { type: array, items: { type: string } }
        allowed:        { type: array, items: { type: string } }
        unknown_action: { type: string, enum: [allow, warn, block] }
        on_sbom_error:  { type: string, enum: [allow, warn, block] }
        or_semantics:   { type: string, enum: [any_allowed, all_allowed], default: any_allowed }

    # ---- Vulnerability scan schemas (Phase 1+2 contracts) ----------------
    Severity:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW, UNKNOWN, INFO]

    Component:
      type: object
      required: [id, project_id, name, ecosystem]
      properties:
        id:           { type: integer, format: int64 }
        project_id:   { type: integer, format: int64 }
        name:         { type: string, pattern: "^[a-z0-9][a-z0-9._/-]{0,255}$" }
        display_name: { type: string }
        description:  { type: string }
        ecosystem:    { type: string, example: "pypi" }
        repo_url:     { type: string }
        ai_enabled:   { type: boolean }
        enabled:      { type: boolean }
        last_scan_id: { type: integer, format: int64, nullable: true }

    ComponentRow:
      allOf:
        - $ref: "#/components/schemas/Component"
        - type: object
          properties:
            project_label:       { type: string }
            last_scan_at:        { type: string, format: date-time }
            last_scan_trigger:   { type: string, enum: [upload, manual, rescan] }
            critical_count:      { type: integer }
            high_count:          { type: integer }
            medium_count:        { type: integer }
            low_count:           { type: integer }
            new_critical_count:  { type: integer, description: "Δ vs the previous successful run" }
            new_high_count:      { type: integer }
            stale:               { type: boolean, description: "True when last_scan_at is older than vuln_scan.stale_threshold" }

    ScanRun:
      type: object
      required: [id, component_id, trigger, status, sbom_blob_path, sbom_sha256]
      properties:
        id:                  { type: integer, format: int64 }
        component_id:        { type: integer, format: int64 }
        trigger:             { type: string, enum: [upload, manual, rescan] }
        status:              { type: string, enum: [pending, running, done, failed] }
        sbom_blob_path:      { type: string }
        sbom_size_bytes:     { type: integer, format: int64 }
        sbom_format:         { type: string, example: "cyclonedx-json" }
        sbom_sha256:         { type: string, description: "Lowercase hex; verified on every read" }
        started_at:          { type: string, format: date-time }
        finished_at:         { type: string, format: date-time, nullable: true }
        scanner_status:      { type: string, description: "JSON object: {scannerName: status}" }
        critical_count:      { type: integer }
        high_count:          { type: integer }
        medium_count:        { type: integer }
        low_count:           { type: integer }
        new_critical_count:  { type: integer }
        new_high_count:      { type: integer }
        component_count:     { type: integer, description: "Number of CycloneDX components in the SBOM" }
        error_message:       { type: string }
        integrity_violated:  { type: boolean, description: "True when SBOM SHA-256 mismatches blob" }

    ScanFinding:
      type: object
      required: [id, scan_run_id, component_id, cve_id, package_name, severity, detected_by]
      properties:
        id:               { type: integer, format: int64 }
        scan_run_id:      { type: integer, format: int64 }
        component_id:     { type: integer, format: int64 }
        cve_id:           { type: string, example: "CVE-2024-12345" }
        package_name:     { type: string }
        package_version:  { type: string }
        ecosystem:        { type: string }
        severity:         { $ref: "#/components/schemas/Severity" }
        cvss_score:       { type: number, format: float }
        fixed_version:    { type: string, description: "Empty when no fix is available" }
        summary:          { type: string }
        detected_by:      { type: string, description: "Scanner name (osv, trivy, etc)" }
        is_suppressed:    { type: boolean }
        suppressed_by:    { type: integer, format: int64, nullable: true, description: "ignore_id when is_suppressed" }

    Ignore:
      type: object
      required: [id, component_id, cve_id, package_name, reason, created_by_email, created_at]
      properties:
        id:                       { type: integer, format: int64 }
        component_id:             { type: integer, format: int64 }
        cve_id:                   { type: string }
        package_name:             { type: string }
        package_version:          { type: string, description: "Informational only — suppression is per-package" }
        reason:                   { type: string }
        ai_draft_accepted:        { type: boolean }
        expires_at:               { type: string, format: date-time, nullable: true }
        created_against_run_id:   { type: integer, format: int64, nullable: true }
        created_by_email:         { type: string }
        created_at:               { type: string, format: date-time }
        revoked_at:               { type: string, format: date-time, nullable: true }
        revoked_by_email:         { type: string, nullable: true }

    IgnoreCreateRequest:
      type: object
      required: [cve_id, package_name, reason]
      properties:
        cve_id:             { type: string }
        package_name:       { type: string }
        package_version:    { type: string }
        reason:             { type: string }
        expires_at:         { type: string, format: date-time, nullable: true }
        ai_draft_accepted:  { type: boolean }
        against_run_id:     { type: integer, format: int64 }

    VulnSummary:
      type: object
      required: [total_critical, total_high, total_medium, total_low]
      properties:
        total_critical:           { type: integer }
        total_high:               { type: integer }
        total_medium:             { type: integer }
        total_low:                { type: integer }
        components_new_critical:  { type: integer }
        stale_components:         { type: integer }

    Anomaly:
      type: object
      required: [id, component_id, detected_at, sigma, summary]
      properties:
        id:                 { type: integer, format: int64 }
        component_id:       { type: integer, format: int64 }
        detected_at:        { type: string, format: date-time }
        triggering_run_id:  { type: integer, format: int64, nullable: true }
        severity_delta:     { type: integer, description: "current - baseline_mean" }
        baseline_mean:      { type: number, format: double }
        baseline_stddev:    { type: number, format: double }
        sigma:              { type: number, format: double }
        summary:            { type: string }

    FixPathInsight:
      type: object
      properties:
        component_id:        { type: integer, format: int64 }
        package_name:        { type: string }
        current_version:     { type: string }
        recommended_version: { type: string }
        cves_resolved:       { type: array, items: { type: string } }
        critical_resolved:   { type: integer }
        high_resolved:       { type: integer }

    # ---- Vulnerability scan schemas (Phase 1+2 contracts) -----------------
