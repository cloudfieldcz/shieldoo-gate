openapi: 3.1.0
info:
  title: Shieldoo Gate REST API
  description: |
    Administration and observability API for Shieldoo Gate — an open-source
    supply chain security proxy for Docker, PyPI, npm, NuGet, and more.
  version: 1.1.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development (admin port)

tags:
  - name: health
    description: Service health
  - name: artifacts
    description: Cached artifact management
  - name: audit
    description: Append-only audit log
  - name: overrides
    description: Policy override management
  - name: stats
    description: Request and scan statistics
  - name: feed
    description: Threat feed management
  - name: docker
    description: Docker repository and tag management
  - name: api-keys
    description: API key management for proxy authentication
  - name: auth
    description: OIDC authentication flow
  - name: admin
    description: Administrative actions (policy mode, bulk operations)
  - name: config
    description: Runtime configuration endpoints
  - name: metrics
    description: Prometheus metrics

paths:
  /auth/login:
    get:
      summary: Initiate OIDC login flow
      operationId: authLogin
      tags: [auth]
      description: |
        Redirects the user to the OIDC provider's authorization endpoint.
        Generates a state parameter (CSRF protection) and PKCE code verifier,
        stored in short-lived httpOnly cookies.
      responses:
        "302":
          description: Redirect to OIDC provider authorization endpoint

  /auth/callback:
    get:
      summary: OIDC callback after provider authorization
      operationId: authCallback
      tags: [auth]
      description: |
        Handles the OIDC provider's redirect back with an authorization code.
        Validates state, exchanges the code for tokens using PKCE, verifies
        the ID token, and sets a session cookie.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to UI root on success
        "400":
          description: Missing or invalid state/code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token exchange or verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: Clear session cookie
      operationId: authLogout
      tags: [auth]
      description: Clears the session cookie, logging the user out.
      responses:
        "200":
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [logged_out]

  /auth/refresh:
    post:
      summary: Refresh the session cookie
      operationId: authRefresh
      tags: [auth]
      description: |
        Re-verifies the session cookie and reissues it with a fresh expiry.
        Returns 401 if the session is missing or expired.
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [refreshed]
        "401":
          description: No session or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/userinfo:
    get:
      summary: Get authenticated user info
      operationId: authUserInfo
      tags: [auth]
      description: |
        Returns the current authenticated user's identity (subject, email, name).
        Requires a valid session cookie or Bearer token.
      responses:
        "200":
          description: Authenticated user information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/health:
    get:
      summary: Service health check
      operationId: getHealth
      tags: [health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/artifacts:
    get:
      summary: List cached artifacts
      operationId: listArtifacts
      tags: [artifacts]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
      responses:
        "200":
          description: Paginated list of artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactPage"

  /api/v1/artifacts/{id}:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Get artifact detail
      operationId: getArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact with current status and scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/scan-results:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Get scan history for an artifact
      operationId: getArtifactScanResults
      tags: [artifacts]
      responses:
        "200":
          description: List of scan results (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/rescan:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Trigger an async rescan of the artifact
      operationId: rescanArtifact
      tags: [artifacts]
      responses:
        "202":
          description: Rescan queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RescanResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/quarantine:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Manually quarantine an artifact
      operationId: quarantineArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact quarantined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUpdate"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}/release:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Release a quarantined artifact back to CLEAN status and create a policy override
      operationId: releaseArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact released with policy override created (or reused if one already exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: CLEAN
                  artifact_id:
                    type: string
                    example: "pypi:requests:2.32.5"
                  override_id:
                    type: integer
                    example: 1
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/artifacts/{id}:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    delete:
      summary: Delete artifact (cache + DB)
      description: |
        Permanently removes an artifact from cache and database, including all
        associated scan results and status records. This is the only resolution
        for SHA256 integrity violations — delete the artifact, next request
        re-fetches fresh from upstream.
      operationId: deleteArtifact
      tags: [artifacts]
      responses:
        "200":
          description: Artifact deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  artifact:
                    type: string
                    example: "npm:lodash:4.17.21"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/audit:
    get:
      summary: List audit log entries
      operationId: listAudit
      tags: [audit]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: event_type
          in: query
          required: false
          description: Filter by event type
          schema:
            type: string
            enum: [SERVED, BLOCKED, QUARANTINED, RELEASED, SCANNED, OVERRIDE_CREATED, OVERRIDE_REVOKED, TAG_MUTATED, RESCAN_QUEUED, ALLOWED_WITH_WARNING, INTEGRITY_VIOLATION, ARTIFACT_DELETED]
      responses:
        "200":
          description: Paginated list of audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"

  /api/v1/overrides:
    get:
      summary: List policy overrides
      operationId: listOverrides
      tags: [overrides]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: active
          in: query
          required: false
          description: Filter by active status (revoked=false if true, revoked=true if false)
          schema:
            type: boolean
        - name: ecosystem
          in: query
          required: false
          description: Filter by ecosystem (exact match)
          schema:
            type: string
            enum: [docker, pypi, npm, nuget, maven, rubygems, go]
        - name: name
          in: query
          required: false
          description: Filter by package name (substring match, case-sensitive)
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of policy overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyOverridePage"
    post:
      summary: Create a new policy override
      operationId: createOverride
      tags: [overrides]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyOverrideRequest"
      responses:
        "201":
          description: Override created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOverrideResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/overrides/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Override ID
        schema:
          type: integer
          format: int64
    delete:
      summary: Revoke (soft-delete) a policy override
      operationId: revokeOverride
      tags: [overrides]
      responses:
        "200":
          description: Override revoked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverrideRevokeResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Override already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/artifacts/{id}/override:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    post:
      summary: Create policy override from artifact
      operationId: createArtifactOverride
      tags: [overrides]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtifactOverrideRequest"
      responses:
        "201":
          description: Override created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArtifactOverrideResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stats/summary:
    get:
      summary: Aggregated request and scan statistics
      operationId: getStatsSummary
      tags: [stats]
      responses:
        "200":
          description: Aggregated totals and daily buckets for the last 7 days
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /api/v1/stats/blocked:
    get:
      summary: List of blocked artifact events
      operationId: getStatsBlocked
      tags: [stats]
      responses:
        "200":
          description: Audit log entries with event_type=BLOCKED (newest first, max 500)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedEntry"

  /api/v1/feed:
    get:
      summary: List threat feed entries
      operationId: listFeed
      tags: [feed]
      responses:
        "200":
          description: Threat feed entries (newest first, max 1000)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreatFeedEntry"

  /api/v1/feed/refresh:
    post:
      summary: Trigger an async threat feed refresh
      operationId: refreshFeed
      tags: [feed]
      responses:
        "202":
          description: Refresh queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"

  /api/v1/docker/repositories:
    get:
      summary: List Docker repositories
      operationId: listDockerRepositories
      tags: [docker]
      parameters:
        - name: registry
          in: query
          required: false
          description: Filter by registry host (e.g. ghcr.io)
          schema:
            type: string
      responses:
        "200":
          description: List of Docker repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockerRepository"

  /api/v1/docker/repositories/{id}/tags:
    parameters:
      - $ref: "#/components/parameters/dockerRepoId"
    get:
      summary: List tags for a Docker repository
      operationId: listDockerTags
      tags: [docker]
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockerTag"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Create or move a tag on a Docker repository
      operationId: createDockerTag
      tags: [docker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDockerTagRequest"
      responses:
        "201":
          description: Tag created or moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDockerTagResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/docker/repositories/{id}/tags/{tag}:
    parameters:
      - $ref: "#/components/parameters/dockerRepoId"
      - name: tag
        in: path
        required: true
        description: Tag name
        schema:
          type: string
          example: "v1.0"
    delete:
      summary: Delete a tag from a Docker repository
      operationId: deleteDockerTag
      tags: [docker]
      responses:
        "204":
          description: Tag deleted (artifact is NOT removed)
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/docker/sync/{id}:
    parameters:
      - $ref: "#/components/parameters/dockerRepoId"
    post:
      summary: Trigger a manual sync for a Docker repository
      operationId: triggerDockerSync
      tags: [docker]
      responses:
        "202":
          description: Sync queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Sync service not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/docker/registries:
    get:
      summary: List allowed Docker registries from config
      operationId: listDockerRegistries
      tags: [docker]
      responses:
        "200":
          description: List of allowed registries (credentials are never exposed)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DockerRegistry"

  /metrics:
    get:
      summary: Prometheus metrics endpoint
      operationId: getMetrics
      tags: [metrics]
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /api/v1/public-urls:
    get:
      summary: Get configured public URLs for ecosystem proxies
      operationId: getPublicURLs
      tags: [config]
      description: |
        Returns the public-facing URLs configured in the `public_urls` config section.
        The admin UI uses these to display correct proxy URLs on the Usage/Profile page.
        Empty strings indicate no public URL is configured for that ecosystem (the UI
        falls back to `<host>:port` format).
      responses:
        "200":
          description: Public URLs for each ecosystem
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicURLs"

  /api/v1/api-keys:
    post:
      summary: Create a new API key
      operationId: createAPIKey
      tags: [api-keys]
      description: |
        Creates a new per-user API key (PAT) for proxy authentication.
        The plaintext token is returned only once in the response.
        Requires OIDC authentication on the admin API.
        Only available when both `auth.enabled` and `proxy_auth.enabled` are true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Human-readable label for the key
                  example: ci-pipeline
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreateResponse"
        "400":
          description: Invalid request (missing name)

    get:
      summary: List API keys owned by the authenticated user
      operationId: listAPIKeys
      tags: [api-keys]
      description: |
        Returns API keys owned by the authenticated user (enabled and disabled).
        The key hash and plaintext are never included in the response.
        Only available when both `auth.enabled` and `proxy_auth.enabled` are true.
        Returns 401 if authentication is missing or invalid.
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"

  /api/v1/api-keys/{id}:
    delete:
      summary: Revoke an API key
      operationId: revokeAPIKey
      tags: [api-keys]
      description: |
        Permanently disables an API key (sets enabled=false).
        Revocation is permanent — the key cannot be re-enabled.
        Only available when both `auth.enabled` and `proxy_auth.enabled` are true.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Key revoked
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Cannot revoke another user's key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Key not found

  /api/v1/admin/policy-mode:
    get:
      summary: Get current policy mode
      operationId: getPolicyMode
      tags: [admin]
      description: |
        Returns the current policy evaluation mode (strict, balanced, or permissive).
        See the Policy Tiers documentation for mode behavior details.
      responses:
        "200":
          description: Current policy mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyModeResponse"
    put:
      summary: Set policy mode
      operationId: setPolicyMode
      tags: [admin]
      description: |
        Changes the policy evaluation mode at runtime. The change takes effect
        immediately for all subsequent artifact evaluations. Existing quarantined
        artifacts are not re-evaluated automatically; use the rescan-quarantined
        endpoint to trigger re-evaluation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [strict, balanced, permissive]
                  description: The policy mode to set
      responses:
        "200":
          description: Policy mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyModeResponse"
        "400":
          description: Invalid mode value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/rescan-quarantined:
    post:
      summary: Rescan all quarantined artifacts
      operationId: rescanQuarantined
      tags: [admin]
      description: |
        Moves all QUARANTINED artifacts to PENDING_SCAN status and triggers
        rescans. Useful after policy mode changes or scanner updates. An audit
        log entry (RESCAN_QUEUED) is created for each artifact.
      responses:
        "200":
          description: Rescans queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RescanQuarantinedResponse"

  /api/v1/projects:
    get:
      summary: List projects
      operationId: listProjects
      tags: [projects]
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/Project" }
    post:
      summary: Create a project (explicit / strict-mode provisioning)
      operationId: createProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:        { type: string, pattern: "^[a-z0-9][a-z0-9_-]{0,63}$" }
                display_name: { type: string }
                description:  { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "400": { description: Invalid label }
        "429": { description: Project hard-cap reached }

  /api/v1/projects/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Get a single project
      operationId: getProject
      tags: [projects]
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { description: Not found }
    patch:
      summary: Update project metadata
      operationId: updateProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                description:  { type: string }
                enabled:      { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
    delete:
      summary: Soft-disable a project (metadata only in v1.2)
      operationId: disableProject
      tags: [projects]
      responses:
        "204": { description: Disabled }

  /api/v1/projects/{id}/artifacts:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Artifacts used by this project
      operationId: listProjectArtifacts
      tags: [projects]
      responses:
        "200":
          description: Project artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:             { type: string }
                        ecosystem:      { type: string }
                        name:           { type: string }
                        version:        { type: string }
                        first_used_at:  { type: string }
                        last_used_at:   { type: string }
                        use_count:      { type: integer }

  /api/v1/projects/{id}/license-policy:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Effective license policy for a project
      operationId: getProjectLicensePolicy
      tags: [projects, license]
      responses:
        "200":
          description: License policy view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LicensePolicyView" }
    put:
      summary: Upsert per-project license policy override
      operationId: putProjectLicensePolicy
      tags: [projects, license]
      description: |
        Requires projects.mode=strict. In lazy mode the server rejects
        mode=override with 403 to prevent label-spoofing policy bypass.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LicensePolicyUpdate" }
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LicensePolicyView" }
        "403": { description: strict_required — override requires strict projects mode }
    delete:
      summary: Remove per-project override (fall back to inherit)
      operationId: deleteProjectLicensePolicy
      tags: [projects, license]
      description: |
        Deletes the `project_license_policy` row for this project; the
        project then inherits the global policy. The resolver's cached
        per-project entry is evicted so subsequent requests pick up the
        reverted effective policy immediately. Safe to call when no row
        exists (no-op).
      responses:
        "200":
          description: Effective policy after delete (mode=inherit)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LicensePolicyView" }

  /api/v1/policy/licenses:
    get:
      summary: Effective global license policy (runtime-mutable)
      operationId: getGlobalLicensePolicy
      tags: [license, policy]
      description: |
        Returns the policy currently in effect. `source=db` means a runtime
        edit persisted in `global_license_policy` is active; `source=config`
        means the YAML values from `policy.licenses.*` are the fallback.
      responses:
        "200":
          description: Global license policy view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalLicensePolicyView" }
    put:
      summary: Upsert the global license policy (applied live, no restart)
      operationId: putGlobalLicensePolicy
      tags: [license, policy]
      description: |
        Persists to the `global_license_policy` singleton row (id=1) and
        pushes the new values into the live resolver + policy engine. The
        per-project license cache is purged so projects inheriting the
        global policy see the new values immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GlobalLicensePolicyUpdate" }
      responses:
        "200":
          description: Updated view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalLicensePolicyView" }
        "400": { description: Validation error (bad enum value) }
    delete:
      summary: Revert to the YAML fallback
      operationId: deleteGlobalLicensePolicy
      tags: [license, policy]
      description: |
        Deletes the `global_license_policy` row and swaps the live resolver
        back to the YAML values captured at startup (`policy.licenses.*`
        from `docker/config.yaml`). Purges the per-project policy cache so
        inheritors pick up the reverted values immediately. The subsequent
        GET returns `source: "config"`.
      responses:
        "200":
          description: Policy after revert (source=config)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalLicensePolicyView" }

  /api/v1/artifacts/{id}/sbom:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Download the CycloneDX SBOM blob for an artifact
      operationId: getArtifactSBOM
      tags: [artifacts, sbom]
      responses:
        "200":
          description: CycloneDX JSON
          content:
            application/vnd.cyclonedx+json:
              schema:
                type: object
        "404": { description: No SBOM exists for this artifact }
        "501": { description: SBOM feature disabled }

  /api/v1/artifacts/{id}/licenses:
    parameters:
      - $ref: "#/components/parameters/artifactId"
    get:
      summary: Pre-extracted SPDX IDs for an artifact's SBOM
      operationId: getArtifactLicenses
      tags: [artifacts, license]
      responses:
        "200":
          description: License list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id:     { type: string }
                  licenses:        { type: array, items: { type: string } }
                  component_count: { type: integer }
                  generator:       { type: string }
                  generated_at:    { type: string, format: date-time }

components:
  parameters:
    artifactId:
      name: id
      in: path
      required: true
      description: Artifact identifier in the form `ecosystem:name:version`
      schema:
        type: string
        example: "pypi:requests:2.31.0"
    dockerRepoId:
      name: id
      in: path
      required: true
      description: Docker repository ID
      schema:
        type: integer
        format: int64
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    per_page:
      name: per_page
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    APIKey:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        owner_email:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true

    APIKeyCreateResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        owner_email:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        token:
          type: string
          description: Plaintext API key — shown only once, never again

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        scanners:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScannerHealth"

    ScannerHealth:
      type: object
      required: [healthy]
      properties:
        healthy:
          type: boolean
        error:
          type: string

    Artifact:
      type: object
      required: [ecosystem, name, version, upstream_url, sha256, size_bytes, cached_at, last_accessed_at, storage_path]
      properties:
        ecosystem:
          type: string
          example: pypi
        name:
          type: string
          example: requests
        version:
          type: string
          example: 2.31.0
        upstream_url:
          type: string
          format: uri
        sha256:
          type: string
        size_bytes:
          type: integer
          format: int64
        cached_at:
          type: string
          format: date-time
        last_accessed_at:
          type: string
          format: date-time
        storage_path:
          type: string

    ArtifactStatusObject:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [CLEAN, SUSPICIOUS, QUARANTINED, PENDING_SCAN]
        quarantine_reason:
          type: string
        quarantined_at:
          type: string
          format: date-time
          nullable: true
        released_at:
          type: string
          format: date-time
          nullable: true

    ArtifactWithStatus:
      allOf:
        - $ref: "#/components/schemas/Artifact"
        - type: object
          required: [id, status]
          properties:
            id:
              type: string
              description: Composite artifact ID (ecosystem:name:version)
              example: "pypi:requests:2.31.0"
            status:
              $ref: "#/components/schemas/ArtifactStatusObject"

    ArtifactDetail:
      description: Artifact detail response (returned by GET /api/v1/artifacts/{id})
      allOf:
        - $ref: "#/components/schemas/ArtifactWithStatus"
        - type: object
          properties:
            scan_results:
              type: array
              items:
                $ref: "#/components/schemas/ScanResult"

    ArtifactPage:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactWithStatus"
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ScanResult:
      type: object
      required: [id, artifact_id, scanned_at, scanner_name, scanner_version, verdict, confidence, findings_json, duration_ms]
      properties:
        id:
          type: integer
          format: int64
        artifact_id:
          type: string
        scanned_at:
          type: string
          format: date-time
        scanner_name:
          type: string
        scanner_version:
          type: string
        verdict:
          type: string
          enum: [CLEAN, SUSPICIOUS, MALICIOUS]
        confidence:
          type: number
          format: float
        findings_json:
          type: string
          description: JSON-encoded array of findings
        duration_ms:
          type: integer
          format: int64

    ArtifactStats:
      type: object
      required: [total, clean, suspicious, quarantined, pending_scan]
      properties:
        total:
          type: integer
          format: int64
          description: Total number of cached artifacts
        clean:
          type: integer
          format: int64
          description: Artifacts with CLEAN status
        suspicious:
          type: integer
          format: int64
          description: Artifacts with SUSPICIOUS status
        quarantined:
          type: integer
          format: int64
          description: Artifacts with QUARANTINED status
        pending_scan:
          type: integer
          format: int64
          description: Artifacts with PENDING_SCAN status

    RequestStats:
      type: object
      required: [served_24h, blocked_24h, served_all, blocked_all]
      properties:
        served_24h:
          type: integer
          format: int64
          description: Number of SERVED requests in the last 24 hours
        blocked_24h:
          type: integer
          format: int64
          description: Number of BLOCKED requests in the last 24 hours
        served_all:
          type: integer
          format: int64
          description: Total number of SERVED requests (all time)
        blocked_all:
          type: integer
          format: int64
          description: Total number of BLOCKED requests (all time)

    StatsSummary:
      type: object
      required: [artifacts, requests, by_period]
      properties:
        artifacts:
          $ref: "#/components/schemas/ArtifactStats"
        requests:
          $ref: "#/components/schemas/RequestStats"
        by_period:
          type: object
          description: Daily request count buckets for the last 7 days keyed by date (YYYY-MM-DD)
          additionalProperties:
            type: object
            properties:
              served:
                type: integer
                format: int64
              blocked:
                type: integer
                format: int64
              quarantined:
                type: integer
                format: int64

    BlockedEntry:
      type: object
      required: [id, ts]
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        artifact_id:
          type: string
        client_ip:
          type: string
        reason:
          type: string

    ThreatFeedEntry:
      type: object
      required: [sha256, ecosystem, package_name, reported_at]
      properties:
        sha256:
          type: string
        ecosystem:
          type: string
        package_name:
          type: string
        version:
          type: string
        reported_at:
          type: string
          format: date-time
        source_url:
          type: string
          format: uri
        iocs_json:
          type: string
          description: JSON-encoded array of indicators of compromise

    AcceptedResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [accepted]
        message:
          type: string

    StatusUpdate:
      type: object
      required: [status, artifact_id]
      properties:
        status:
          type: string
          enum: [CLEAN, QUARANTINED]
        artifact_id:
          type: string

    AuditEntry:
      type: object
      required: [id, ts, event_type]
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: string
          format: date-time
        event_type:
          type: string
          enum: [SERVED, BLOCKED, QUARANTINED, RELEASED, SCANNED, OVERRIDE_CREATED, OVERRIDE_REVOKED, TAG_MUTATED, RESCAN_QUEUED, ALLOWED_WITH_WARNING]
        artifact_id:
          type: string
        client_ip:
          type: string
        user_agent:
          type: string
        reason:
          type: string
        metadata_json:
          type: string
          description: JSON-encoded additional metadata
        user_email:
          type: string
          description: Email of the user who performed the action

    AuditPage:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    PolicyOverride:
      type: object
      required: [id, ecosystem, name, scope, created_by, created_at, revoked]
      properties:
        id:
          type: integer
          format: int64
        ecosystem:
          type: string
          description: Package ecosystem
          example: pypi
        name:
          type: string
          description: Package name
          example: requests
        version:
          type: string
          description: Package version (null for package-scope overrides)
          example: 2.32.3
          nullable: true
        scope:
          type: string
          description: Override scope
          enum: [version, package]
          example: version
        reason:
          type: string
          description: Reason for override
          example: "False positive: safe package"
        created_by:
          type: string
          description: User ID or API key that created the override
          example: admin
        created_at:
          type: string
          format: date-time
          example: "2026-03-25T10:30:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration timestamp
          example: "2026-06-25T10:30:00Z"
        revoked:
          type: boolean
          description: Whether this override has been revoked
          example: false
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when override was revoked
          example: null

    PolicyOverridePage:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PolicyOverride"
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    CreatePolicyOverrideRequest:
      type: object
      required: [ecosystem, name, scope]
      properties:
        ecosystem:
          type: string
          description: Package ecosystem
          example: pypi
        name:
          type: string
          description: Package name
          example: requests
        version:
          type: string
          description: Package version (required if scope is version)
          example: 2.32.3
        scope:
          type: string
          description: Override scope
          enum: [version, package]
          example: version
        reason:
          type: string
          description: Reason for override
          example: "False positive: safe package"

    CreateArtifactOverrideRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for override
          example: "False positive: safe package"
        scope:
          type: string
          description: Override scope (default: version)
          enum: [version, package]
          example: version

    OverrideRevokeResponse:
      type: object
      required: [status, id]
      properties:
        status:
          type: string
          enum: [revoked]
          example: revoked
        id:
          type: string
          description: Override ID (string representation)
          example: "42"

    DockerRepository:
      type: object
      required: [id, registry, name, is_internal, created_at, sync_enabled]
      properties:
        id:
          type: integer
          format: int64
        registry:
          type: string
          example: docker.io
        name:
          type: string
          example: library/nginx
        is_internal:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        sync_enabled:
          type: boolean

    DockerTag:
      type: object
      required: [id, repo_id, tag, manifest_digest, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        repo_id:
          type: integer
          format: int64
        tag:
          type: string
          example: "v1.0"
        manifest_digest:
          type: string
          example: "sha256:abc123..."
        artifact_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDockerTagRequest:
      type: object
      required: [tag, manifest_digest]
      properties:
        tag:
          type: string
          example: "v1.0"
        manifest_digest:
          type: string
          example: "sha256:abc123..."

    CreateDockerTagResponse:
      type: object
      required: [tag, manifest_digest, tag_moved]
      properties:
        tag:
          type: string
        manifest_digest:
          type: string
        tag_moved:
          type: boolean
          description: True if an existing tag was moved to a new digest
        rescan_triggered:
          type: boolean
          description: True if a re-scan was triggered due to tag movement

    DockerRegistry:
      type: object
      required: [host, url]
      properties:
        host:
          type: string
          example: docker.io
        url:
          type: string
          format: uri
          example: https://registry-1.docker.io

    RescanResponse:
      type: object
      required: [status, artifact_id, message]
      properties:
        status:
          type: string
          enum: [PENDING_SCAN]
        artifact_id:
          type: string
        message:
          type: string

    CreateOverrideResponse:
      type: object
      required: [id, ecosystem, name, scope, reason]
      description: Response from POST /api/v1/overrides (subset of PolicyOverride fields)
      properties:
        id:
          type: integer
          format: int64
        ecosystem:
          type: string
          example: pypi
        name:
          type: string
          example: requests
        version:
          type: string
          example: 2.32.3
        scope:
          type: string
          enum: [version, package]
        reason:
          type: string

    CreateArtifactOverrideResponse:
      type: object
      required: [id, artifact_id, scope, reason]
      description: Response from POST /api/v1/artifacts/{id}/override
      properties:
        id:
          type: integer
          format: int64
        artifact_id:
          type: string
          example: "pypi:requests:2.32.3"
        scope:
          type: string
          enum: [version, package]
        reason:
          type: string

    UserInfo:
      type: object
      required: [sub, email, name]
      properties:
        sub:
          type: string
          description: OIDC subject identifier
        email:
          type: string
          format: email
        name:
          type: string

    PublicURLs:
      type: object
      description: Public-facing URLs for each ecosystem proxy
      properties:
        pypi:
          type: string
          example: "https://pypi.gate.example.com"
        npm:
          type: string
          example: "https://npm.gate.example.com"
        nuget:
          type: string
          example: "https://nuget.gate.example.com"
        docker:
          type: string
          example: "https://cr.gate.example.com"
        maven:
          type: string
          example: "https://maven.gate.example.com"
        rubygems:
          type: string
          example: "https://gems.gate.example.com"
        gomod:
          type: string
          example: "https://go.gate.example.com"

    PolicyModeResponse:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [strict, balanced, permissive]
          description: Current policy evaluation mode

    RescanQuarantinedResponse:
      type: object
      required: [queued, message]
      properties:
        queued:
          type: integer
          description: Number of artifacts queued for rescan
          example: 12
        message:
          type: string
          example: "Quarantined artifacts queued for rescan"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Project:
      type: object
      required: [id, label, created_at, created_via, enabled]
      properties:
        id:          { type: integer, format: int64 }
        label:       { type: string, pattern: "^[a-z0-9][a-z0-9_-]{0,63}$" }
        display_name: { type: string }
        description: { type: string }
        created_at:  { type: string, format: date-time }
        created_via: { type: string, enum: [lazy, api, seed] }
        enabled:     { type: boolean }

    LicensePolicyView:
      type: object
      properties:
        project_id:       { type: integer, format: int64 }
        mode:             { type: string, enum: [inherit, override, disabled] }
        blocked:          { type: array, items: { type: string } }
        warned:           { type: array, items: { type: string } }
        allowed:          { type: array, items: { type: string } }
        unknown_action:   { type: string, enum: [allow, warn, block] }
        updated_at:       { type: string }
        updated_by:       { type: string }
        effective_source: { type: string, description: "Human-readable source of the effective policy" }
        strict_required:  { type: boolean, description: "True when mode=override but runtime is lazy — override is ignored" }

    LicensePolicyUpdate:
      type: object
      required: [mode]
      properties:
        mode:           { type: string, enum: [inherit, override, disabled] }
        blocked:        { type: array, items: { type: string } }
        warned:         { type: array, items: { type: string } }
        allowed:        { type: array, items: { type: string } }
        unknown_action: { type: string, enum: [allow, warn, block, ""] }

    GlobalLicensePolicyView:
      type: object
      properties:
        enabled:        { type: boolean, description: "Mirror of the YAML master switch — policy.licenses.enabled (file-controlled)" }
        blocked:        { type: array, items: { type: string } }
        warned:         { type: array, items: { type: string } }
        allowed:        { type: array, items: { type: string } }
        unknown_action: { type: string, enum: [allow, warn, block] }
        on_sbom_error:  { type: string, enum: [allow, warn, block] }
        or_semantics:   { type: string, enum: [any_allowed, all_allowed] }
        updated_at:     { type: string, description: "Present only when source=db" }
        updated_by:     { type: string, description: "Admin email from OIDC session (when auth is enabled)" }
        source:         { type: string, enum: [db, config], description: "Where the live values came from" }

    GlobalLicensePolicyUpdate:
      type: object
      required: [blocked, warned, allowed, unknown_action, on_sbom_error]
      properties:
        enabled:        { type: boolean, description: "Optional — toggles the DB-persisted row; YAML master switch still wins if false" }
        blocked:        { type: array, items: { type: string } }
        warned:         { type: array, items: { type: string } }
        allowed:        { type: array, items: { type: string } }
        unknown_action: { type: string, enum: [allow, warn, block] }
        on_sbom_error:  { type: string, enum: [allow, warn, block] }
        or_semantics:   { type: string, enum: [any_allowed, all_allowed], default: any_allowed }
