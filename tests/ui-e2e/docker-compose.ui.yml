# docker-compose.ui.yml — overlay for the standalone UI test suite (tests/ui-e2e/run.sh).
#
# Layered on top of tests/e2e-shell/docker-compose.e2e.yml. It swaps the gate's
# mounted config for config.ui.yaml — a copy of config.e2e.yaml with the
# AI-backed scanners (ai-scanner, version-diff) downgraded from "required" to
# "best_effort". The UI suite brings up a creds-free gate, so leaving those
# scanners "required" would FATAL at boot ("required scanner ... not registered")
# because the AI scanner needs Azure OpenAI credentials (.env) that must never be
# committed. config.ui.yaml is generated by run.sh and is git-ignored.
#
# A volume entry with the same container target (/etc/shieldoo-gate/config.yaml)
# REPLACES the base mount rather than adding to it — verified via
# `docker compose -f base -f override config`. Project name is kept as
# "shieldoo-e2e" so the bridge network (shieldoo-e2e_proxy-net) is unchanged.
name: shieldoo-e2e
services:
  shieldoo-gate:
    volumes:
      - ../e2e-shell/config.ui.yaml:/etc/shieldoo-gate/config.yaml:ro
