# config.e2e.yaml — Shieldoo Gate e2e test configuration
# Differences from dev config:
#   - allowlist: [] (empty — no bypasses, tests the full scan pipeline)
#   - threat_feed.enabled: false (avoids flaky TLS errors in CI)
#   - log.level: "debug"
#   - scanners.timeout: "120s" (longer for first-run trivy DB download)

server:
  host: "0.0.0.0"

ports:
  pypi: 5000
  npm: 4873
  nuget: 5001
  docker: 5002
  maven: 8085
  rubygems: 8086
  gomod: 8087
  admin: 8080

upstreams:
  pypi: "https://pypi.org"
  npm: "https://registry.npmjs.org"
  nuget: "https://api.nuget.org"
  maven: "https://repo1.maven.org/maven2"
  rubygems: "https://rubygems.org"
  gomod: "https://proxy.golang.org"
  docker:
    default_registry: "https://registry-1.docker.io"
    allowed_registries:
      - host: "gcr.io"
        url: "https://gcr.io"
      - host: "ghcr.io"
        url: "https://ghcr.io"
      - host: "cgr.dev"
        url: "https://cgr.dev"
    sync:
      enabled: true
      interval: "1h"
      rescan_interval: "2h"
      max_concurrent: 2
    push:
      enabled: true

cache:
  backend: "local"
  local:
    path: "/var/cache/shieldoo-gate"
    max_size_gb: 50
  # S3 keys present so Viper can bind SGW_CACHE_S3_* env overrides for pass 2.
  s3:
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    force_path_style: false
    access_key_env: ""
    secret_key_env: ""
  # Azure Blob keys present so Viper can bind SGW_CACHE_AZURE_BLOB_* env overrides for pass 3.
  azure_blob:
    account_name: ""
    container_name: ""
    connection_string_env: ""
    prefix: ""
  ttl:
    pypi: "168h"
    npm: "168h"
    nuget: "168h"
    maven: "168h"
    docker: "720h"

database:
  backend: "sqlite"
  sqlite:
    path: "/var/lib/shieldoo-gate/gate.db"
  # Postgres keys present so Viper can bind SGW_DATABASE_POSTGRES_* env overrides.
  postgres:
    dsn: ""
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: "5m"

scanners:
  parallel: true
  timeout: "120s"
  guarddog:
    enabled: true
    bridge_socket: "/tmp/shieldoo-bridge.sock"
  trivy:
    enabled: true
    binary: "trivy"
    cache_dir: "/var/cache/trivy"
  osv:
    enabled: true
    api_url: "https://api.osv.dev"
  # AI scanner: enabled via AI_SCANNER_ENABLED env var (default false).
  # When enabled in e2e, tests malicious .pth detection through the proxy.
  ai:
    enabled: false                       # overridden by SGW_SCANNERS_AI_ENABLED env var
    provider: "azure_openai"
    model: "gpt-5.4-mini"
    api_key_env: "AI_SCANNER_API_KEY"
    timeout: "15s"
    max_input_tokens: 32000
    bridge_socket: "/tmp/shieldoo-bridge.sock"
    azure_endpoint: ""
    azure_deployment: "gpt-54-mini"
  # Typosquatting detection: enabled by default, checks package names against popular packages.
  typosquat:
    enabled: true
    top_packages_count: 5000
    max_edit_distance: 2
    internal_namespaces: []
    combosquat_suffixes:
      - "-utils"
      - "-helper"
      - "-lib"
      - "-dev"
      - "-tool"
      - "-sdk"
    allowlist: []
  # Version diff analysis: enabled in e2e to test diff detection when previous versions are cached.
  version_diff:
    enabled: true
    max_artifact_size_mb: 20
    max_extracted_size_mb: 200
    max_extracted_files: 10000
    scanner_timeout: "10s"
    entropy_sample_bytes: 8192
    allowlist: []
    thresholds:
      code_volume_ratio: 5.0
      max_new_files: 20
      entropy_delta: 2.0
    sensitive_patterns: []
  # Reputation scanner: enabled in e2e to test upstream metadata risk scoring.
  reputation:
    enabled: true
    cache_ttl: "24h"
    cache_ttl_jitter: "0s"           # no jitter in E2E for deterministic behavior
    timeout: "10s"
    rate_limit: 60                    # higher limit for E2E burst
    retention_days: 1
    thresholds:
      suspicious: 0.8               # higher threshold in E2E to avoid false positives
      malicious: 0.95               # from limited NuGet metadata (pagination inflates scores)

policy:
  # mode is overridden via SGW_POLICY_MODE env var per E2E pass
  mode: "strict"
  block_if_verdict: "MALICIOUS"
  quarantine_if_verdict: "SUSPICIOUS"
  minimum_confidence: 0.7
  behavioral_minimum_confidence: 0.35
  ai_triage:
    # enabled is overridden via SGW_POLICY_AI_TRIAGE_ENABLED per pass
    enabled: false
    timeout: "5s"
    min_confidence: 0.7
    cache_ttl: "168h"
    rate_limit: 10
    circuit_breaker_threshold: 5
    circuit_breaker_cooldown: "60s"
  allowlist: []

threat_feed:
  enabled: false
  url: "https://feed.shieldoo.io/malicious-packages.json"
  refresh_interval: "1h"

log:
  level: "debug"
  format: "text"
  file: "/var/log/shieldoo-gate/gate.log"

# Proxy auth: disabled by default in E2E; enabled via SGW_PROXY_AUTH_ENABLED env override.
proxy_auth:
  enabled: false
  global_token_env: "SGW_PROXY_TOKEN"
