# docker-compose.e2e.auth.yml — Override for E2E pass 2 (auth + PostgreSQL + MinIO)
#
# Usage: docker compose -f docker-compose.e2e.yml -f docker-compose.e2e.auth.yml up
#
# SECURITY: All credentials below are TEST-ONLY for ephemeral E2E containers.
# NEVER reuse these in production. Production deployments must use Docker secrets
# or a vault integration — see docs/deployment.md.
#
# Docker Compose environment merging is ADDITIVE: the override adds new env vars
# to the base file's environment block, it does not replace it. Base env vars
# (SGW_PROXY_AUTH_ENABLED, SGW_PROXY_TOKEN, etc.) are preserved.

services:
  postgres:
    image: postgres:17.4-alpine
    environment:
      POSTGRES_DB: shieldoo_e2e
      POSTGRES_USER: shieldoo
      POSTGRES_PASSWORD: shieldoo_e2e_pass
    # No volume — always starts with an empty database. Migrations run at gateway startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shieldoo -d shieldoo_e2e"]
      interval: 2s
      timeout: 3s
      retries: 15
    networks:
      - internal-net
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    # Start MinIO, wait for readiness, create the bucket, then keep running.
    entrypoint: >
      /bin/sh -c "
      minio server /data --console-address ':9001' &
      MINIO_PID=$$!;
      until mc alias set local http://localhost:9000 minioadmin minioadmin123 2>/dev/null; do sleep 0.5; done;
      mc mb local/shieldoo-cache --ignore-existing;
      wait $$MINIO_PID
      "
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 15
    networks:
      - internal-net
    restart: "no"

  shieldoo-gate:
    depends_on:
      scanner-bridge:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Database → PostgreSQL
      # sslmode=disable is safe here (isolated Docker network);
      # production MUST use sslmode=require or sslmode=verify-full.
      SGW_DATABASE_BACKEND: "postgres"
      SGW_DATABASE_POSTGRES_DSN: "postgres://shieldoo:shieldoo_e2e_pass@postgres:5432/shieldoo_e2e?sslmode=disable&connect_timeout=5"
      # Cache → S3 (MinIO)
      # NOTE: The S3 backend will log a warning "non-HTTPS endpoint configured
      # (potential SSRF risk)" for http://minio:9000 — this is expected in E2E
      # and safe within the isolated Docker network.
      SGW_CACHE_BACKEND: "s3"
      SGW_CACHE_S3_BUCKET: "shieldoo-cache"
      SGW_CACHE_S3_ENDPOINT: "http://minio:9000"
      SGW_CACHE_S3_REGION: "us-east-1"
      SGW_CACHE_S3_FORCE_PATH_STYLE: "true"
      SGW_CACHE_S3_ACCESS_KEY_ENV: "MINIO_ACCESS_KEY"
      SGW_CACHE_S3_SECRET_KEY_ENV: "MINIO_SECRET_KEY"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin123"

  test-runner:
    environment:
      SGW_CACHE_BACKEND: "s3"
