version: "3.9"

services:
  shieldoo-gate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SGW_TOKEN: ${SGW_TOKEN:-}
    platform: linux/amd64
    depends_on:
      scanner-bridge:
        condition: service_started
    ports:
      - "5010:5000"   # PyPI (host 5010 to avoid macOS AirPlay conflict on 5000)
      - "4873:4873"   # npm
      - "5001:5001"   # NuGet
      - "5002:5002"   # Docker registry
      - "8085:8085"   # Maven
      - "8086:8086"   # RubyGems
      - "8087:8087"   # Go Modules
      - "8080:8080"   # Admin API
    volumes:
      - bridge-socket:/tmp
      - gate-data:/var/lib/shieldoo-gate
      - gate-cache:/var/cache/shieldoo-gate
      - trivy-cache:/var/cache/trivy
      - ./config.yaml:/etc/shieldoo-gate/config.yaml:ro
    env_file:
      - .env
    environment:
      SGW_SCANNERS_GUARDDOG_BRIDGE_SOCKET: /tmp/shieldoo-bridge.sock
    restart: unless-stopped

  scanner-bridge:
    build:
      context: ../scanner-bridge
      dockerfile: Dockerfile
      args:
        SGW_TOKEN: ${SGW_TOKEN:-}
    platform: linux/amd64
    volumes:
      - bridge-socket:/tmp
    environment:
      BRIDGE_SOCKET: /tmp/shieldoo-bridge.sock
      AI_SCANNER_ENABLED: "${AI_SCANNER_ENABLED:-false}"
      AI_SCANNER_API_KEY: "${AI_SCANNER_API_KEY:-}"
      AI_SCANNER_PROVIDER: "${AI_SCANNER_PROVIDER:-azure_openai}"
      AI_SCANNER_AZURE_ENDPOINT: "${AI_SCANNER_AZURE_ENDPOINT:-}"
      AI_SCANNER_AZURE_DEPLOYMENT: "${AI_SCANNER_AZURE_DEPLOYMENT:-gpt-54-mini}"
    restart: unless-stopped

volumes:
  bridge-socket:
  gate-data:
  gate-cache:
  trivy-cache:
