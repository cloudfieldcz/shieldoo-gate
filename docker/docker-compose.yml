version: "3.9"

services:
  shieldoo-gate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    platform: linux/amd64
    depends_on:
      scanner-bridge:
        condition: service_started
    ports:
      - "5010:5000"   # PyPI (host 5010 to avoid macOS AirPlay conflict on 5000)
      - "4873:4873"   # npm
      - "5001:5001"   # NuGet
      - "5002:5002"   # Docker registry
      - "8080:8080"   # Admin API
    volumes:
      - bridge-socket:/tmp
      - gate-data:/var/lib/shieldoo-gate
      - gate-cache:/var/cache/shieldoo-gate
      - trivy-cache:/var/cache/trivy
      - ./config.yaml:/etc/shieldoo-gate/config.yaml:ro
    env_file:
      - .env
    environment:
      SGW_SCANNERS_GUARDDOG_BRIDGE_SOCKET: /tmp/shieldoo-bridge.sock
    restart: unless-stopped

  scanner-bridge:
    build:
      context: ../scanner-bridge
      dockerfile: Dockerfile
    platform: linux/amd64
    volumes:
      - bridge-socket:/tmp
    environment:
      BRIDGE_SOCKET: /tmp/shieldoo-bridge.sock
    restart: unless-stopped

volumes:
  bridge-socket:
  gate-data:
  gate-cache:
  trivy-cache:
