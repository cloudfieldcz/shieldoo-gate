services:
  shieldoo-gate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SGW_TOKEN: ${SGW_TOKEN:-}
        APP_VERSION: ${APP_VERSION:-dev}
    # Pinned to amd64 by default (prod parity). The version-diff local-repro
    # harness exports SGW_PLATFORM="" to run native — emulation serializes
    # execution and hides the concurrent DB pressure the cascade needs.
    # NB: `${VAR-default}` (no colon) keeps an explicitly-empty value empty.
    platform: ${SGW_PLATFORM-linux/amd64}
    depends_on:
      scanner-bridge:
        condition: service_started
    ports:
      - "5010:5000"   # PyPI (host 5010 to avoid macOS AirPlay conflict on 5000)
      - "4873:4873"   # npm
      - "5001:5001"   # NuGet
      - "5002:5002"   # Docker registry
      - "8085:8085"   # Maven
      - "8086:8086"   # RubyGems
      - "8087:8087"   # Go Modules
      - "8080:8080"   # Admin API
    volumes:
      - bridge-socket:/tmp
      - gate-data:/var/lib/shieldoo-gate
      - gate-cache:/var/cache/shieldoo-gate
      - trivy-cache:/var/cache/trivy
      - ./config.yaml:/etc/shieldoo-gate/config.yaml:ro
    environment:
      # Well-known shared token used by the examples/ smoke-test projects.
      # This is a DEVELOPMENT default only — rotate (or switch to per-user PATs
      # via the admin UI) before pointing any non-test client at this proxy.
      SGW_PROXY_TOKEN: "test-token-123"
    env_file:
      - .env
    restart: unless-stopped

  scanner-bridge:
    build:
      context: ../scanner-bridge
      dockerfile: Dockerfile
      args:
        SGW_TOKEN: ${SGW_TOKEN:-}
    platform: ${SGW_PLATFORM-linux/amd64}
    volumes:
      - bridge-socket:/tmp
      # Read-only access to the gate cache for AI-driven version-diff:
      # the bridge needs to open the previously-cached artifact via the
      # path the gate sends in ScanArtifactDiff.previous_path.
      - gate-cache:/var/cache/shieldoo-gate:ro
    environment:
      BRIDGE_SOCKET: /tmp/shieldoo-bridge.sock
      # Concurrent-scan cap (default 64). Lower it on a small host so a burst
      # of parallel scans doesn't oversubscribe the CPU and trip the gate's
      # required-scanner timeout. See docs/deployment.md.
      BRIDGE_MAX_WORKERS: "${BRIDGE_MAX_WORKERS:-64}"
      AI_SCANNER_ENABLED: "${AI_SCANNER_ENABLED:-false}"
      AI_SCANNER_API_KEY: "${AI_SCANNER_API_KEY:-}"
      AI_SCANNER_PROVIDER: "${AI_SCANNER_PROVIDER:-azure_openai}"
      AI_SCANNER_AZURE_ENDPOINT: "${AI_SCANNER_AZURE_ENDPOINT:-}"
      AI_SCANNER_AZURE_DEPLOYMENT: "${AI_SCANNER_AZURE_DEPLOYMENT:-gpt-54-mini}"
    restart: unless-stopped

volumes:
  bridge-socket:
  gate-data:
  gate-cache:
  trivy-cache:
