# config.example.yaml — Shieldoo Gate v1.0 reference configuration

server:
  host: "0.0.0.0"

ports:
  pypi: 5000
  npm: 4873
  nuget: 5001
  docker: 5002
  maven: 8085
  rubygems: 8086
  gomod: 8087
  admin: 8080

upstreams:
  pypi: "https://pypi.org"
  npm: "https://registry.npmjs.org"
  nuget: "https://api.nuget.org"
  maven: "https://repo1.maven.org/maven2"
  rubygems: "https://rubygems.org"
  gomod: "https://proxy.golang.org"
  docker:
    default_registry: "https://registry-1.docker.io"
    allowed_registries:
      - host: "ghcr.io"
        url: "https://ghcr.io"
      - host: "quay.io"
        url: "https://quay.io"
    sync:
      enabled: false
      interval: "6h"
      rescan_interval: "24h"
      max_concurrent: 3
    push:
      enabled: false

cache:
  backend: "local"                 # "local" (default), "s3", "azure_blob", or "gcs"
  local:
    path: "/var/cache/shieldoo-gate"
    max_size_gb: 50
  s3:
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    force_path_style: false
    access_key_env: ""
    secret_key_env: ""
  azure_blob:
    account_name: ""
    container_name: ""
    connection_string_env: ""
    prefix: ""
  gcs:
    bucket: ""
    credentials_file: ""
    prefix: ""
  ttl:
    pypi: "168h"
    npm: "168h"
    nuget: "168h"
    docker: "720h"

database:
  backend: "sqlite"
  sqlite:
    path: "/var/lib/shieldoo-gate/gate.db"
  postgres:
    # DSN should be provided via environment variable SGW_DATABASE_POSTGRES_DSN
    dsn: ""
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: "5m"

scanners:
  parallel: true
  timeout: "60s"
  guarddog:
    enabled: true
    bridge_socket: "/tmp/shieldoo-bridge.sock"
  trivy:
    enabled: true
    binary: "trivy"
    cache_dir: "/var/cache/trivy"
  osv:
    enabled: true
    api_url: "https://api.osv.dev"
  # AI scanner (LLM-based). Uses Azure OpenAI gpt-5.4-mini to analyze install-time
  # scripts for malicious patterns. Synchronous, opt-in. Requires AI_SCANNER_API_KEY env var.
  ai:
    enabled: true
    provider: "azure_openai"
    model: "gpt-5.4-mini"
    api_key_env: "AI_SCANNER_API_KEY"
    timeout: "45s"
    max_input_tokens: 32000
    bridge_socket: "/tmp/shieldoo-bridge.sock"
    azure_endpoint: ""
    azure_deployment: "gpt-54-mini"
  sandbox:
    enabled: false
    runtime_binary: "runsc"
    timeout: "30s"
    network_policy: "none"
    max_concurrent: 2

policy:
  block_if_verdict: "MALICIOUS"
  quarantine_if_verdict: "SUSPICIOUS"
  minimum_confidence: 0.7
  allowlist:
    - "pypi:litellm:==1.82.6"
  tag_mutability:
    enabled: true
    action: "warn"
    exclude_tags: ["latest", "nightly", "dev"]
    check_on_cache_hit: false

threat_feed:
  enabled: true
  url: "https://feed.shieldoo.io/malicious-packages.json"
  refresh_interval: "1h"

rescan:
  enabled: true
  interval: "6h"
  batch_size: 100
  max_concurrent: 5

log:
  level: "debug"
  format: "json"

# OIDC authentication for admin API (opt-in, disabled by default).
# When disabled, the admin API is fully open — suitable for development/testing.
# In production, set enabled: true and configure your OIDC provider.
auth:
  enabled: false
  issuer_url: ""                     # OIDC provider URL, e.g. "https://accounts.google.com"
  client_id: ""                      # OAuth2 client ID from your OIDC provider
  client_secret_env: "SGW_OIDC_CLIENT_SECRET"  # Env var holding the client secret
  redirect_url: "http://localhost:8080/auth/callback" # e.g. "https://shieldoo-gate.example.com:8080/auth/callback"
  scopes: ["openid", "email", "profile"]

# API key authentication for proxy endpoints (pip, npm, docker, nuget, gem, go).
# When disabled (default), proxy endpoints are open — protected by network segmentation only.
# When enabled, all proxy requests require a valid API key via HTTP Basic Auth.
# Keys are either per-user PATs (generated via admin API) or a global shared token.
proxy_auth:
  enabled: false
  global_token_env: "SGW_PROXY_TOKEN"  # Env var holding the global shared token (optional)

alerts:
  webhook:
    enabled: false
  slack:
    enabled: false
  email:
    enabled: false
