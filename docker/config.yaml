# config.yaml — Shieldoo Gate v1.1 reference configuration

server:
  host: "0.0.0.0"

ports:
  pypi: 5000
  npm: 4873
  nuget: 5001
  docker: 5002
  maven: 8085
  rubygems: 8086
  gomod: 8087
  admin: 8080

upstreams:
  pypi: "https://pypi.org"
  npm: "https://registry.npmjs.org"
  nuget: "https://api.nuget.org"
  maven: "https://repo1.maven.org/maven2"
  maven_resolver:
    enabled: true
  rubygems: "https://rubygems.org"
  gomod: "https://proxy.golang.org"
  docker:
    default_registry: "https://registry-1.docker.io"
    allowed_registries:
      - host: "ghcr.io"
        url: "https://ghcr.io"
      - host: "quay.io"
        url: "https://quay.io"
    sync:
      enabled: false
      interval: "6h"
      rescan_interval: "24h"
      max_concurrent: 3
    push:
      enabled: false

cache:
  backend: "local"                 # "local" (default), "s3", "azure_blob", or "gcs"
  local:
    path: "/var/cache/shieldoo-gate"
    max_size_gb: 50
  s3:
    bucket: ""
    region: ""
    endpoint: ""
    prefix: ""
    force_path_style: false
    access_key_env: ""
    secret_key_env: ""
  azure_blob:
    account_name: ""
    container_name: ""
    connection_string_env: ""
    prefix: ""
  gcs:
    bucket: ""
    credentials_file: ""
    prefix: ""
  ttl:
    pypi: "168h"
    npm: "168h"
    nuget: "168h"
    docker: "720h"

database:
  backend: "sqlite"
  sqlite:
    path: "/var/lib/shieldoo-gate/gate.db"
  postgres:
    # DSN should be provided via environment variable SGW_DATABASE_POSTGRES_DSN
    dsn: ""
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: "5m"

scanners:
  parallel: true
  timeout: "60s"
  guarddog:
    enabled: true
    bridge_socket: "/tmp/shieldoo-bridge.sock"
  trivy:
    enabled: true
    binary: "trivy"
    cache_dir: "/var/cache/trivy"
  osv:
    enabled: true
    api_url: "https://api.osv.dev"
  # AI scanner (LLM-based). Uses Azure OpenAI gpt-5.4-mini to analyze install-time
  # scripts for malicious patterns. Synchronous, opt-in. Requires AI_SCANNER_API_KEY env var.
  ai:
    enabled: true
    provider: "azure_openai"
    model: "gpt-5.4-mini"
    api_key_env: "AI_SCANNER_API_KEY"
    timeout: "45s"
    max_input_tokens: 32000
    bridge_socket: "/tmp/shieldoo-bridge.sock"
    azure_endpoint: ""
    azure_deployment: "gpt-54-mini"
  sandbox:
    enabled: false
    runtime_binary: "runsc"
    timeout: "30s"
    network_policy: "none"
    max_concurrent: 2
  typosquat:
    enabled: true
    top_packages_count: 5000
    max_edit_distance: 2
    internal_namespaces: []
    combosquat_suffixes:
      - "-utils"
      - "-helper"
      - "-lib"
      - "-dev"
      - "-tool"
      - "-sdk"
    allowlist: []
    persist_dedup_window_seconds: 300
  # AI-driven version diff scanner (v2.0+) — opt-in. Requires scanner-bridge
  # with AI scanner enabled. Leave disabled in this reference dev config so
  # the stack runs without an Azure OpenAI key. To enable: set enabled: true,
  # mode: "shadow" for ≥7 days, then flip to "active". See docs/scanners/version-diff.md.
  version_diff:
    enabled: false
    mode: "shadow"
    max_artifact_size_mb: 50
    max_extracted_size_mb: 50
    max_extracted_files: 5000
    scanner_timeout: "55s"
    bridge_socket: ""
    allowlist: []
    min_confidence: 0.6
    per_package_rate_limit: 10
    daily_cost_limit_usd: 5.0
    circuit_breaker_threshold: 5
  reputation:
    enabled: true
    cache_ttl: "24h"
    cache_ttl_jitter: "2h"
    timeout: "10s"
    rate_limit: 30
    retention_days: 30
    thresholds:
      suspicious: 0.5
      malicious: 0.8

policy:
  mode: "balanced"
  block_if_verdict: "MALICIOUS"
  quarantine_if_verdict: "SUSPICIOUS"
  minimum_confidence: 0.7
  behavioral_minimum_confidence: 0.35  # Lower threshold for behavioral scanners (guarddog, ai-scanner, etc.)
  ai_triage:
    enabled: true
    timeout: "5s"
    min_confidence: 0.7
    cache_ttl: "168h"
    rate_limit: 10
    circuit_breaker_threshold: 5
    circuit_breaker_cooldown: "60s"
  allowlist:
    - "pypi:litellm:==1.82.6"
    # Written in PEP 503 canonical form (hyphen). The allowlist parser
    # canonicalizes the ecosystem name before matching, so either spelling
    # would work — canonical is preferred because that's what artifact rows
    # are keyed on after migration 024.
    - "pypi:strawberry-graphql:==0.263.0"
    - "pypi:six:==1.17.0"
  tag_mutability:
    enabled: true
    action: "warn"
    exclude_tags: ["latest", "nightly", "dev"]
    check_on_cache_hit: false
  # SPDX-based license policy (v1.2+). YAML here is the startup fallback; the
  # effective policy can be edited at runtime from the admin UI (License Policy)
  # and persisted to the global_license_policy DB row (overrides these values).
  licenses:
    enabled: true
    blocked: []              # seed empty — populate from the UI (group presets)
    warned: []
    allowed: []
    unknown_action: "allow"  # allow | warn | block
    on_sbom_error: "allow"   # allow | warn | block
    or_semantics: "any_allowed"

threat_feed:
  enabled: true
  url: "https://feed.shieldoo.io/malicious-packages.json"
  refresh_interval: "1h"

rescan:
  enabled: true
  interval: "6h"
  batch_size: 100
  max_concurrent: 5

log:
  level: "debug"
  format: "text"

# OIDC authentication for admin API (opt-in, disabled by default).
# When disabled, the admin API is fully open — suitable for development/testing.
# In production, set enabled: true and configure your OIDC provider.
auth:
  enabled: false
  issuer_url: ""                     # OIDC provider URL, e.g. "https://accounts.google.com"
  client_id: ""                      # OAuth2 client ID from your OIDC provider
  client_secret_env: "SGW_OIDC_CLIENT_SECRET"  # Env var holding the client secret
  redirect_url: "http://localhost:8080/auth/callback" # e.g. "https://shieldoo-gate.example.com:8080/auth/callback"
  scopes: ["openid", "email", "profile"]
  cookie_insecure: true              # Local HTTP dev only — allows the http redirect_url above.
                                     # MUST be false (default) in production so session cookies are Secure.

# API key authentication for proxy endpoints (pip, npm, docker, nuget, gem, go).
# When disabled, proxy endpoints are open — protected by network segmentation only.
# When enabled, all proxy requests require a valid API key via HTTP Basic Auth.
# Keys are either per-user PATs (generated via admin API) or a global shared token.
#
# This reference config has auth ENABLED + a well-known test token so the
# examples/ projects can exercise the full Basic-auth → project-label flow
# without any extra setup. For production, switch to PATs (or rotate the
# global token) and never hard-code the token in a committed config.
proxy_auth:
  enabled: true
  global_token_env: "SGW_PROXY_TOKEN"  # Env var holding the global shared token

# Project registry — derives a project label from the HTTP Basic-auth username.
# This dev config runs in **strict** mode so per-project license-policy overrides
# are honoured (the S-01 anti-spoofing guard requires strict). Bootstrap labels
# below are pre-provisioned on every startup so the examples/ smoke-tests, the
# self-build (shieldoo-gate), and CI (ci-bot) can authenticate immediately
# without an admin POST /projects.
projects:
  mode: strict              # lazy | strict
  default_label: default    # fallback when Basic-auth username is empty
  max_count: 1000
  lazy_create_rate: 10
  cache_size: 512
  cache_ttl: 5m
  usage_flush_period: 30s
  bootstrap_labels:
    - default
    - shieldoo-gate    # used by docker/Dockerfile (SGW_USER) for self-build dogfood
    - python-demo      # examples/python-requests
    - npm-demo         # examples/npm-chalk
    - dotnet-demo      # examples/dotnet-json
    - maven-demo       # examples/maven-example
    - rubygems-demo    # examples/rubygems-example
    - go-demo          # examples/go-example
    - ci-bot           # tests/e2e-shell — generic CI/E2E identity

# SBOM generation — CycloneDX JSON produced from the single-run Trivy scan
# and persisted asynchronously to the active blob backend.
sbom:
  enabled: true
  format: cyclonedx-json
  async_write: true
  ttl: 90d

# Vulnerability scan — push-from-CI feature (v1.3+). Components/projects can
# upload SBOMs via shdg CLI or POST /api/v1/projects/{label}/components/{name}/scans.
# Trivy + OSV scan the SBOM and produce findings; the UI exposes ignore/release
# workflows and per-project license-policy overrides. Without this block enabled
# the /api/v1/vulnerabilities/* endpoints return 404 and the UI tab is hidden.
vuln_scan:
  enabled: true
  max_sbom_bytes: 10485760           # 10 MiB
  max_components: 10000
  max_components_per_project: 200
  stale_threshold: "30d"             # mark scans older than this as STALE
  rescan:
    interval: "6h"                   # background rescan cadence
    max_concurrent: 4
    timeout: "5m"                    # per-scan-run timeout
  retention:
    keep_n: 100                      # keep last N scan_runs per component
    interval: "1h"                   # retention sweep cadence
    grace_period: "5m"
  scanners:
    osv:
      api_url: "https://api.osv.dev"
      timeout: "30s"
      chunk_size: 100                # max packages per OSV /querybatch
      rate_limit: 5.0                # req/sec to api.osv.dev
      cache_ttl: "1h"
    trivy:
      binary_path: "trivy"           # uses image's pinned trivy
      timeout: "5m"
      use_server_mode: false         # v1.1+ optional client/server split
  alerts:
    aggregation_window: "5m"
    aggregation_min_events: 3
    ignore_expired_notify_creator: true
  rate_limit:
    uploads_per_hour: 60             # per-token budget; bursts allowed
    ignores_per_hour: 30             # per (token, component)
    ignores_global_per_hour: 200
    rescans_per_hour: 6              # per (token, component)

# AI features — master flag for AI-assisted UX (ignore-reason drafter, anomaly
# detection). Disabled by default in this reference dev config; requires Azure
# OpenAI credentials to be useful. Flip enabled: true and fill azure_openai
# block to activate.
ai_features:
  enabled: false
  ignore_reason_drafter:
    enabled: false
    daily_token_budget: 5000000
    max_draft_tokens: 200
    rate_limit_per_minute: 1.0
  anomaly_detection:
    enabled: false
    baseline_days: 30
    min_baseline_samples: 7
    sigma_threshold: 3.0
  azure_openai:
    endpoint: ""
    api_key_env: "AI_FEATURES_API_KEY"
    deployment: ""
    api_version: "2024-08-01-preview"

# Public-facing URLs for each ecosystem proxy, displayed in the admin UI
# usage instructions. Empty = generic <host>:port placeholders.
public_urls:
  pypi: ""
  npm: ""
  nuget: ""
  docker: ""
  maven: ""
  rubygems: ""
  gomod: ""

alerts:
  webhook:
    enabled: false
  slack:
    enabled: false
  email:
    enabled: false
